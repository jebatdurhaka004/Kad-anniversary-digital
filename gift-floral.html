<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>A Bouquet for You 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400;1,500&family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100svh;overflow-x:hidden;background:#faf8f5}
body{font-family:'Cormorant Garamond',serif;cursor:none}
#cur{position:fixed;width:8px;height:8px;background:rgba(180,100,80,.5);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
.pg{display:none;position:fixed;inset:0;overflow:hidden}
.pg.on{display:block}

/* PAGE 0 - ENVELOPE */
#pg0{background:#fdfcfa}
#pg0.on{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem}
.env-wrap{cursor:pointer;position:relative;animation:envBob 3s ease-in-out infinite;filter:drop-shadow(0 10px 30px rgba(100,60,40,.12))}
@keyframes envBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.env-wrap:active{transform:scale(.95)!important}
.env-svg{width:clamp(180px,52vw,240px);display:block}
.env-flower-top{position:absolute;top:-38%;left:50%;transform:translateX(-50%);width:90%;pointer-events:none;animation:flBob 3s ease-in-out infinite}
@keyframes flBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
.tap-txt{font-style:italic;font-size:clamp(.82rem,3vw,1rem);color:rgba(140,100,80,.4);letter-spacing:.2em;animation:tapBlink 2.5s ease-in-out infinite}
@keyframes tapBlink{0%,100%{opacity:.4}50%{opacity:.8}}

/* PAGE 1 - HEART BOUQUET */
#pg1{background:#fff}
#pg1.on{display:flex;align-items:center;justify-content:center;flex-direction:column}
.heart-wrap{position:relative;width:min(82vw,82vh);height:min(82vw,82vh);cursor:pointer;animation:hIn 1.2s cubic-bezier(.22,1,.36,1) forwards;opacity:0;max-width:420px;max-height:420px}
@keyframes hIn{from{opacity:0;transform:scale(.55) rotate(-8deg)}60%{opacity:1;transform:scale(1.04) rotate(1deg)}to{opacity:1;transform:scale(1)}}
.heart-mask{width:100%;height:100%;position:relative;overflow:hidden}
/* Heart shape mask */
.heart-mask::before{content:'';position:absolute;inset:0;z-index:10;background:#fff;
clip-path:polygon(0% 0%,0% 100%,100% 100%,100% 0%,
50% 17%,62% 5%,76% 3%,89% 11%,96% 27%,96% 44%,
88% 59%,76% 72%,63% 83%,50% 93%,
37% 83%,24% 72%,12% 59%,4% 44%,4% 27%,
11% 11%,24% 3%,38% 5%,50% 17%)}
.heart-img{width:100%;height:100%;object-fit:cover;filter:saturate(1.15) brightness(1.02)}
.p1-tap{position:fixed;bottom:7%;left:50%;transform:translateX(-50%);font-style:italic;font-size:clamp(.8rem,3vw,1rem);color:rgba(120,80,70,.4);letter-spacing:.18em;animation:tapBlink 2.5s ease-in-out infinite;white-space:nowrap;z-index:5}
/* Petals */
.pet{position:fixed;top:-50px;font-size:var(--s,1rem);left:var(--l,50%);opacity:0;pointer-events:none;animation:petFall var(--d,6s) ease-in infinite;animation-delay:var(--dl,0s);z-index:20}
@keyframes petFall{0%{opacity:0;transform:translateY(0) rotate(0)}6%{opacity:.8}94%{opacity:.3}100%{opacity:0;transform:translateY(110vh) rotate(540deg) scale(.4)}}

/* PAGE 2 - FULL BLOOM */
#pg2{background:#fff;cursor:pointer}
#pg2.on{display:flex;align-items:center;justify-content:center}
.bloom-wrap{position:absolute;inset:-5%;animation:bloomPan 10s ease-in-out infinite}
@keyframes bloomPan{0%{transform:scale(1)}25%{transform:scale(1.06) translate(-1%,-1%)}50%{transform:scale(1.09) translate(1%,-2%)}75%{transform:scale(1.05) translate(-1%,1%)}100%{transform:scale(1)}}
.bloom-img{width:100%;height:100%;object-fit:cover;filter:saturate(1.3) brightness(1.05)}
.bloom-tap{position:absolute;bottom:7%;left:50%;transform:translateX(-50%);font-style:italic;font-size:clamp(.82rem,3vw,1rem);color:rgba(255,255,255,.9);letter-spacing:.22em;text-shadow:0 2px 8px rgba(0,0,0,.4);animation:tapBlink 2.5s ease-in-out infinite;white-space:nowrap;z-index:5}

/* PAGE 3 - DARK LETTER */
#pg3{background:#18140f;overflow-y:auto}
#pg3.on{display:block}
.dark-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 30%,#22180a,#18140f 60%,#110e08);overflow:hidden}
/* Dark flower decorations - real images */
.dark-fl{position:absolute;opacity:var(--op,.08);filter:grayscale(.85) brightness(.35) saturate(.5);pointer-events:none;object-fit:contain}
.p3-wrap{position:relative;z-index:1;min-height:100svh;display:flex;align-items:center;justify-content:center;padding:3.5rem 1.4rem 5rem}

/* STAMP */
.stamp{background:#f9f6f1;position:relative;width:100%;max-width:420px;transform:rotate(-1.8deg);box-shadow:0 8px 16px rgba(0,0,0,.2),0 30px 80px rgba(0,0,0,.6)}
.stamp::before{content:'';position:absolute;top:-11px;left:0;right:0;height:11px;background:radial-gradient(circle at 50% 0%,#18140f 71%,transparent 71%);background-size:13px 11px;background-repeat:repeat-x}
.stamp::after{content:'';position:absolute;bottom:-11px;left:0;right:0;height:11px;background:radial-gradient(circle at 50% 100%,#18140f 71%,transparent 71%);background-size:13px 11px;background-repeat:repeat-x}
.stamp-l{position:absolute;left:-11px;top:0;bottom:0;width:11px;background:radial-gradient(circle at 100% 50%,#18140f 71%,transparent 71%);background-size:11px 13px;background-repeat:repeat-y}
.stamp-r{position:absolute;right:-11px;top:0;bottom:0;width:11px;background:radial-gradient(circle at 0% 50%,#18140f 71%,transparent 71%);background-size:11px 13px;background-repeat:repeat-y}
.stamp-body{padding:1.5rem 1.5rem 1.5rem 6.5rem;position:relative;min-height:280px}

/* Polaroids */
.pol-strip{position:absolute;left:-1.8rem;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:.35rem;z-index:5}
.pol{background:#fff;padding:.3rem .3rem .2rem;box-shadow:3px 4px 14px rgba(0,0,0,.5);position:relative;width:65px}
.pol:nth-child(1){transform:rotate(-3.5deg)}
.pol:nth-child(2){transform:rotate(2.5deg);margin-left:.4rem}
.pol:nth-child(3){transform:rotate(-2deg)}
.pol::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:radial-gradient(circle at 32% 28%,#ff7878,#cc0505);border-radius:50%;box-shadow:0 2px 5px rgba(0,0,0,.5);z-index:6}
.pol-img{width:100%;aspect-ratio:3/4;overflow:hidden;background:#e8d8d0;display:flex;align-items:center;justify-content:center;font-size:1rem}
.pol-img img{width:100%;height:100%;object-fit:cover}

/* Letter content */
.l-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.9rem;padding-bottom:.7rem;border-bottom:1px solid rgba(140,110,80,.18)}
.l-tf{display:flex;flex-direction:column;gap:.4rem}
.l-row{display:flex;flex-direction:column;gap:.06rem}
.l-lbl{font-size:.5rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(90,60,40,.35)}
.l-name{font-family:'Dancing Script',cursive;font-size:1.15rem;color:#2a1005;line-height:1.05}
.l-right{display:flex;flex-direction:column;align-items:flex-end;gap:.35rem}
.postage{width:40px;height:50px;border:1.5px solid rgba(130,100,70,.22);background:linear-gradient(135deg,#fef5ea,#f5e8d5);display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.pclip{font-size:1rem;transform:rotate(38deg);opacity:.45;display:block;margin-right:.15rem}
.l-lines{background-image:repeating-linear-gradient(to bottom,transparent,transparent 26px,rgba(140,110,80,.1) 26px,rgba(140,110,80,.1) 27px);padding:.3rem 0}
.l-text{font-family:'Dancing Script',cursive;font-size:clamp(.88rem,3.2vw,1.04rem);line-height:1.96;color:#281205}
.l-text p{margin-bottom:.5rem}
.l-sign{font-family:'Dancing Script',cursive;font-size:clamp(1rem,3.8vw,1.3rem);color:#5a2010;text-align:right;margin-top:.6rem}

/* Bouquet side deco - real image */
.stamp-bouquet{position:absolute;right:-3rem;top:45%;transform:translateY(-55%) rotate(18deg);z-index:6;width:75px;filter:drop-shadow(3px 5px 12px rgba(0,0,0,.5))}

.p3-nav{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);display:flex;gap:.8rem;z-index:10}
.p3-btn{font-style:italic;font-size:.88rem;color:rgba(255,255,255,.3);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);padding:.48rem 1.3rem;border-radius:50px;cursor:pointer;transition:all .3s;letter-spacing:.1em;backdrop-filter:blur(8px)}
.p3-btn:hover{color:rgba(255,255,255,.65);border-color:rgba(255,255,255,.28)}
.p3-btn.hi{color:rgba(255,220,170,.6);border-color:rgba(255,220,170,.2)}

/* PAGE 4 - VIDEO */
#pg4{background:#18140f;overflow-y:auto}
#pg4.on{display:flex;align-items:center;justify-content:center}
.p4-wrap{position:relative;z-index:1;width:100%;max-width:480px;padding:3rem 1.4rem 5rem;display:flex;flex-direction:column;align-items:center;gap:1.5rem}
.p4-ttl{font-style:italic;font-size:clamp(1.1rem,4.5vw,1.6rem);color:rgba(255,215,165,.7);text-align:center}
.p4-sub{font-style:italic;font-size:.85rem;color:rgba(255,255,255,.25);text-align:center;margin-top:-.8rem}
.p4-vf{width:100%;border-radius:4px;overflow:hidden;box-shadow:0 12px 45px rgba(0,0,0,.75)}
.p4-vf iframe,.p4-vf video{width:100%;aspect-ratio:16/9;border:none;display:block}
.p4-div{display:flex;align-items:center;gap:.7rem;width:100%}
.p4-line{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(255,200,140,.12),transparent)}
.p4-ico{font-size:.9rem;opacity:.25}

/* LOADING */
#loading{position:fixed;inset:0;background:#fdfcfa;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.3rem;transition:opacity 1.2s}
.ld-img{width:80px;animation:envBob 2.2s ease-in-out infinite}
.ld-txt{font-style:italic;font-size:1rem;color:rgba(140,90,70,.5);letter-spacing:.25em}
.ld-bar{width:110px;height:1px;background:rgba(180,130,100,.1);position:relative;overflow:hidden}
.ld-bar::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(180,130,100,.25),rgba(200,150,120,.45));animation:ldFill 1.8s ease forwards;transform-origin:left}
@keyframes ldFill{from{transform:scaleX(0)}to{transform:scaleX(1)}}
#err{position:fixed;inset:0;background:#fdfcfa;z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem;text-align:center;padding:2rem}

/* MUSIC BAR */
#mbar{position:fixed;bottom:0;left:0;right:0;z-index:8800;background:rgba(20,16,10,.94);backdrop-filter:blur(14px);border-top:1px solid rgba(255,200,140,.05);padding:.48rem 1rem;display:none;align-items:center;gap:.6rem}
#mbar.on{display:flex;animation:mbUp .4s ease}
@keyframes mbUp{from{transform:translateY(100%)}to{transform:none}}
.mbd{width:23px;height:23px;border-radius:50%;flex-shrink:0;background:repeating-conic-gradient(#1a0a0a 0deg,#2d1a14 4deg,#1a0a0a 8deg);position:relative}
.mbd::before{content:'';position:absolute;inset:30%;border-radius:50%;background:#a06040}
.mbd::after{content:'';position:absolute;inset:44%;border-radius:50%;background:rgba(255,255,255,.7)}
.mbd.sp{animation:dSpin 2.5s linear infinite}
@keyframes dSpin{to{transform:rotate(360deg)}}
.mb-i{flex:1;min-width:0}
.mb-t{font-size:.66rem;color:rgba(255,215,165,.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic}
.mb-a{font-size:.54rem;color:rgba(255,255,255,.28)}
.mb-b{flex:1;height:2px;background:rgba(255,255,255,.07);cursor:pointer;border-radius:1px;min-width:50px}
.mb-f{height:100%;background:rgba(180,120,70,.4);border-radius:1px;width:0%}
.mb-btns{display:flex;gap:.35rem}
.mb-btn{background:rgba(255,255,255,.05);border:none;border-radius:50%;width:23px;height:23px;cursor:pointer;color:rgba(255,255,255,.5);font-size:.7rem;display:flex;align-items:center;justify-content:center}
</style>
</head>

<script>
const SB="https://lejpuajafuenlfvlovfg.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlanB1YWphZnVlbmxmdmxvdmZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMjYyNTAsImV4cCI6MjA5MjcwMjI1MH0.rwABj8DyY3dijUr5TurtMoemZgG2b9LgSHSicUMxMmc";
const cur=document.getElementById("cur");
document.addEventListener("mousemove",e=>{cur.style.left=e.clientX+"px";cur.style.top=e.clientY+"px"});
async function load(){
  const p=new URLSearchParams(window.location.search),id=p.get("id");
  if(!id){showErr();return}
  try{
    const r=await fetch(`${SB}/rest/v1/gifts?id=eq.${id}&select=*`,{headers:{"apikey":KEY,"Authorization":"Bearer "+KEY}});
    if(!r.ok)throw new Error();
    const d=await r.json();
    if(!d||!d.length){showErr();return}
    build(d[0]);
    const ld=document.getElementById("loading");
    ld.style.opacity="0";setTimeout(()=>ld.style.display="none",1200);
  }catch(e){showErr()}
}
function showErr(){document.getElementById("loading").style.display="none";document.getElementById("err").style.display="flex"}
function build(G){
  const k=G.kategori||"anniversary";
  document.getElementById("l-to").textContent=G.nama2||"Sayang";
  document.getElementById("l-from").textContent=G.nama1||"Kamu";
  const stamps={birthday:"🎂",anniversary:"🌹",raya:"🌙",kawan:"🌻"};
  document.getElementById("postage").textContent=stamps[k]||"🌸";
  const body=document.getElementById("l-body");
  [G.b1,G.b2,G.b3].filter(Boolean).forEach(t=>{const p=document.createElement("p");p.textContent=t;body.appendChild(p)});
  document.getElementById("l-sign").textContent=`— ${G.nama1||"Kamu"} 🌸`;
  const strip=document.getElementById("pol-strip");
  const bgs=["linear-gradient(135deg,#e0c8d0,#d0b8c0)","linear-gradient(135deg,#d8e0f0,#c8d0e0)","linear-gradient(135deg,#e0ddd0,#d0cdc0)"];
  for(let i=0;i<3;i++){
    const pol=document.createElement("div");pol.className="pol";
    const img=document.createElement("div");img.className="pol-img";img.style.background=bgs[i];
    if(G.photos&&G.photos[i]){const im=document.createElement("img");im.src=G.photos[i];img.appendChild(im)}
    else img.textContent="📷";
    pol.appendChild(img);strip.appendChild(pol);
  }
  const vf=document.getElementById("p4-vf");let hasVid=false;
  if(G.video_url){
    const yt=G.video_url.match(/(?:youtu\.be\/|[?&]v=)([a-zA-Z0-9_-]{11})/);
    if(yt){const iframe=document.createElement("iframe");iframe.src=`https://www.youtube.com/embed/${yt[1]}?rel=0&modestbranding=1&playsinline=1`;iframe.allowFullscreen=true;vf.appendChild(iframe);hasVid=true;document.getElementById("p4-ttl").textContent="Video Untuk Kamu 🎥"}
  } else if(G.video_data){
    const vid=document.createElement("video");vid.src=G.video_data;vid.controls=true;vid.playsInline=true;vf.appendChild(vid);hasVid=true;
  } else if(G.lagu_id){
    const iframe=document.createElement("iframe");iframe.src=`https://www.youtube.com/embed/${G.lagu_id}?rel=0&modestbranding=1&playsinline=1`;iframe.allowFullscreen=true;vf.appendChild(iframe);hasVid=true;
    document.getElementById("p4-ttl").textContent=G.lagu_nama||"Lagu Kita 🎵";
    document.getElementById("p4-sub").textContent=G.lagu_artis||"";
  }
  if(hasVid)document.getElementById("vid-btn").style.display="inline-block";
  if(G.lagu_id){document.getElementById("mb-t").textContent=G.lagu_nama||"Lagu Kita";document.getElementById("mb-a").textContent=G.lagu_artis||"";window._lid=G.lagu_id}
}
function goPage(id){
  document.querySelectorAll(".pg").forEach(p=>p.classList.remove("on"));
  document.getElementById(id).classList.add("on");
  window.scrollTo({top:0,behavior:"instant"});
  if(id==="pg3"){playMusic();showMbar()}
}
function openEnv(){
  const el=document.getElementById("env-el");
  el.style.transition="all .5s cubic-bezier(.22,1,.36,1)";
  el.style.transform="scale(1.15)";el.style.opacity="0";
  setTimeout(()=>goPage("pg1"),450);
}
let yp=null,yr=false,ypl=false;
function lyt(){if(document.querySelector("script[src*=youtube]"))return;const t=document.createElement("script");t.src="https://www.youtube.com/iframe_api";document.head.appendChild(t)}
window.onYouTubeIframeAPIReady=function(){if(!window._lid)return;yp=new YT.Player("ytp",{height:"1",width:"1",videoId:window._lid,playerVars:{autoplay:0,controls:0,disablekb:1,fs:0,iv_load_policy:3,modestbranding:1,rel:0,playsinline:1},events:{onReady:()=>{yr=true},onStateChange:e=>{if(e.data===1){document.getElementById("mbd").classList.add("sp");document.getElementById("mb-play").textContent="⏸";ypl=true;upBar()}else if(e.data===2||e.data===0){document.getElementById("mbd").classList.remove("sp");document.getElementById("mb-play").textContent="▶";ypl=false}}}})};
function playMusic(){if(!window._lid)return;lyt();const t=setInterval(()=>{if(yr&&yp){yp.playVideo();clearInterval(t)}},200)}
function tgp(){if(!yp)return;ypl?yp.pauseVideo():yp.playVideo()}
function tgm(){if(!yp)return;yp.isMuted()?yp.unMute():yp.mute()}
function ska(e){if(!yp||!yr)return;const r=e.currentTarget.getBoundingClientRect();yp.seekTo((e.clientX-r.left)/r.width*yp.getDuration(),true)}
function upBar(){if(!yp||!ypl)return;const d=yp.getDuration(),c=yp.getCurrentTime();if(d>0)document.getElementById("mb-f").style.width=(c/d*100)+"%";if(ypl)setTimeout(upBar,800)}
function showMbar(){document.getElementById("mbar").classList.add("on")}
load();
</script>
</body>
