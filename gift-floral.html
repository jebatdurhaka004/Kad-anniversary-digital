<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>A Bouquet for You 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400;1,500&family=Playfair+Display:ital,wght@0,400;1,400;1,500&family=Nunito:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100svh;overflow-x:hidden;font-family:'Nunito',sans-serif}
body{background:#fff;cursor:none}
#cur{position:fixed;width:7px;height:7px;background:#b07060;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
.pg{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.pg.on{display:flex}

/* PAGE 0 ENVELOPE */
#pg0{background:#fdfcfa}
.env-scene{display:flex;flex-direction:column;align-items:center;gap:clamp(1.5rem,5vh,2.5rem);animation:scIn 1.2s cubic-bezier(.22,1,.36,1) forwards}
@keyframes scIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}
.env{width:clamp(140px,42vw,200px);cursor:pointer;position:relative;transition:transform .4s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(0 6px 18px rgba(120,80,60,.15))}
.env:hover{transform:scale(1.05) translateY(-4px)}
.env:active{transform:scale(.95)}
.env-box{width:100%;padding-bottom:68%;position:relative;background:linear-gradient(165deg,#f7f0e8,#ede5d8);border:1.5px solid rgba(180,150,120,.25);border-radius:2px}
.env-flap{position:absolute;top:0;left:0;right:0;height:54%;background:linear-gradient(168deg,#f2e8dc,#e8ddd0);clip-path:polygon(0 0,100% 0,50% 100%);border-bottom:1px solid rgba(170,140,110,.2)}
.env-sl{position:absolute;left:0;top:0;bottom:0;width:53%;background:linear-gradient(to right,#ede3d5,transparent);clip-path:polygon(0 0,100% 50%,0 100%)}
.env-sr{position:absolute;right:0;top:0;bottom:0;width:53%;background:linear-gradient(to left,#e8ddd0,transparent);clip-path:polygon(100% 0,0 50%,100% 100%)}
.env-sb{position:absolute;bottom:0;left:0;right:0;height:56%;background:linear-gradient(to top,#ede0d0,#f5ede0);clip-path:polygon(0 100%,100% 100%,50% 0%)}
.env-deco{position:absolute;top:12%;left:50%;transform:translateX(-50%);z-index:2;font-size:clamp(1.4rem,6vw,2rem);animation:envFlt 3s ease-in-out infinite;filter:drop-shadow(0 2px 4px rgba(100,60,40,.15))}
@keyframes envFlt{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}
.tap-txt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.82rem,3vw,1rem);color:rgba(140,100,80,.45);letter-spacing:.18em;animation:tapP 2.5s ease-in-out infinite}
@keyframes tapP{0%,100%{opacity:.45}50%{opacity:.85}}

/* PAGE 1 HEART */
#pg1{background:#fff;cursor:pointer}
.heart-scene{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
.flower-heart{width:min(78vw,78vh);height:min(78vw,78vh);position:relative;animation:hReveal 1s cubic-bezier(.22,1,.36,1) forwards;flex-shrink:0}
@keyframes hReveal{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.fh-bg{width:100%;height:100%;border-radius:50%;
background:radial-gradient(ellipse at 28% 30%,#f0a8b0,transparent 45%),radial-gradient(ellipse at 72% 30%,#e89090,transparent 45%),radial-gradient(ellipse at 50% 52%,#d4708a,transparent 40%),radial-gradient(ellipse at 20% 55%,#f0c4b8,transparent 38%),radial-gradient(ellipse at 80% 55%,#e8b8a8,transparent 38%),radial-gradient(ellipse at 50% 78%,#c45875,transparent 32%),radial-gradient(ellipse at 35% 22%,#f8d8b8,transparent 35%),radial-gradient(ellipse at 65% 22%,#f0c8a0,transparent 35%),radial-gradient(ellipse at 15% 42%,#f8e0d0,transparent 30%),radial-gradient(ellipse at 85% 42%,#f0d8c8,transparent 30%),radial-gradient(ellipse at 50% 65%,#e0909a,transparent 35%),radial-gradient(ellipse at 42% 42%,#e8a0c0,transparent 28%),radial-gradient(ellipse at 58% 42%,#d89090,transparent 28%);
clip-path:polygon(50% 18%,62% 6%,76% 4%,89% 12%,96% 28%,96% 44%,88% 59%,76% 72%,63% 83%,50% 93%,37% 83%,24% 72%,12% 59%,4% 44%,4% 28%,11% 12%,24% 4%,38% 6%);
filter:saturate(1.25) brightness(1.08)}
.hfe{position:absolute;font-size:var(--fs,1.8rem);opacity:var(--op,.45);animation:hfSw var(--dur,6s) ease-in-out infinite;animation-delay:var(--dl,0s);pointer-events:none}
@keyframes hfSw{0%,100%{transform:rotate(var(--r,-8deg)) scale(1)}50%{transform:rotate(var(--r2,8deg)) scale(1.06)}}
.pet{position:absolute;font-size:var(--fs,.9rem);left:var(--lft,50%);top:-30px;opacity:0;animation:petDrop var(--dur,6s) ease-in infinite;animation-delay:var(--dl,0s);pointer-events:none}
@keyframes petDrop{0%{opacity:0;transform:translateY(0) rotate(0)}8%{opacity:.7}90%{opacity:.3}100%{opacity:0;transform:translateY(105vh) rotate(360deg) scale(.5)}}
.p1-lbl{position:absolute;bottom:6%;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.8rem,3vw,1rem);color:rgba(120,70,80,.5);letter-spacing:.15em;white-space:nowrap;animation:tapP 2.5s ease-in-out infinite}

/* PAGE 2 FULL BLOOM */
#pg2{background:#f8ede8;cursor:pointer;overflow:hidden}
.bloom-fill{position:absolute;inset:-5%;
background:radial-gradient(ellipse at 15% 20%,#f5a8b0,#e890a0 30%,transparent 55%),radial-gradient(ellipse at 85% 15%,#f0c890,#e8b078 30%,transparent 55%),radial-gradient(ellipse at 50% 50%,#f8d0d8,#f0b8c0 35%,transparent 60%),radial-gradient(ellipse at 20% 75%,#e0a8c8,#d090b8 30%,transparent 50%),radial-gradient(ellipse at 80% 80%,#f8d0a8,#f0b890 30%,transparent 50%),radial-gradient(ellipse at 50% 15%,#f8e8d0,#f0d8b8 25%,transparent 45%),radial-gradient(ellipse at 50% 85%,#d88090,#c87080 30%,transparent 50%),#f0d8d8;
animation:blGrow 10s ease-in-out infinite;filter:saturate(1.3)}
@keyframes blGrow{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.bf{position:absolute;font-size:var(--fs,3rem);opacity:var(--op,.45);animation:bfSw var(--dur,7s) ease-in-out infinite;animation-delay:var(--dl,0s)}
@keyframes bfSw{0%,100%{transform:rotate(var(--ra,-10deg))}50%{transform:rotate(var(--rb,10deg))}}
.bloom-tap{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.82rem,3vw,1rem);color:rgba(255,255,255,.75);letter-spacing:.2em;text-shadow:0 1px 4px rgba(0,0,0,.2);animation:tapP 2.5s ease-in-out infinite;white-space:nowrap}

/* PAGE 3 LETTER */
#pg3{background:#141210;overflow-y:auto;display:none;flex-direction:column;align-items:center}
#pg3.on{display:flex}
.bot-bg{position:fixed;inset:0;pointer-events:none;z-index:0;background:#141210;overflow:hidden}
.bg-fl{position:absolute;font-size:var(--fs,6rem);opacity:var(--op,.1);transform:rotate(var(--rot,0deg));pointer-events:none}
.p3-inner{position:relative;z-index:1;width:100%;max-width:480px;padding:2.5rem 1.2rem 5rem;display:flex;flex-direction:column;align-items:center;gap:2rem}

/* STAMP */
.stamp{width:100%;background:#faf8f4;position:relative}
.stamp::before{content:'';position:absolute;top:-11px;left:0;right:0;height:11px;background:radial-gradient(circle at 50% 0%,#141210 72%,transparent 72%);background-size:13px 11px;background-repeat:repeat-x}
.stamp::after{content:'';position:absolute;bottom:-11px;left:0;right:0;height:11px;background:radial-gradient(circle at 50% 100%,#141210 72%,transparent 72%);background-size:13px 11px;background-repeat:repeat-x}
.stamp-ls{position:absolute;left:-11px;top:0;bottom:0;width:11px;background:radial-gradient(circle at 100% 50%,#141210 72%,transparent 72%);background-size:11px 13px;background-repeat:repeat-y}
.stamp-rs{position:absolute;right:-11px;top:0;bottom:0;width:11px;background:radial-gradient(circle at 0% 50%,#141210 72%,transparent 72%);background-size:11px 13px;background-repeat:repeat-y}
.stamp-in{padding:1.6rem 1.4rem 1.4rem}
.s-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.2rem;padding-bottom:.9rem;border-bottom:1px solid rgba(160,130,100,.18)}
.s-tf{display:flex;flex-direction:column;gap:.55rem}
.s-row{display:flex;flex-direction:column;gap:.1rem}
.s-lbl{font-size:.52rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(100,70,50,.4)}
.s-name{font-family:'Dancing Script',cursive;font-size:1.25rem;color:#4a2810;line-height:1.1}
.s-right{display:flex;flex-direction:column;align-items:flex-end;gap:.4rem}
.postage{width:44px;height:54px;border:1.5px solid rgba(150,120,90,.25);background:linear-gradient(135deg,#fdf6ec,#f5e8d8);display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.pclip{font-size:1.2rem;transform:rotate(35deg);opacity:.5;margin-right:.2rem}
.s-lined{background-image:repeating-linear-gradient(to bottom,transparent,transparent 27px,rgba(150,120,90,.12) 27px,rgba(150,120,90,.12) 28px);padding:.4rem 0}
.s-txt{font-family:'Dancing Script',cursive;font-size:clamp(.9rem,3.2vw,1.06rem);line-height:1.92;color:#3a2010}
.s-sign{font-family:'Dancing Script',cursive;font-size:clamp(1.1rem,4vw,1.4rem);color:#6a3018;text-align:right;margin-top:.7rem}

/* POLAROIDS */
.pols{width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem}
.pol{background:#fff;padding:.38rem .38rem .22rem;box-shadow:2px 4px 12px rgba(0,0,0,.45);position:relative;transition:transform .35s cubic-bezier(.34,1.56,.64,1);cursor:pointer}
.pol:nth-child(1){grid-column:span 2;transform:rotate(-2deg)}
.pol:nth-child(2){transform:rotate(3deg)}
.pol:nth-child(3){transform:rotate(-1.5deg)}
.pol:nth-child(4){transform:rotate(2.5deg)}
.pol:nth-child(5){transform:rotate(-2.5deg)}
.pol:nth-child(6){transform:rotate(1.8deg)}
.pol:hover{transform:rotate(0) scale(1.08) !important;z-index:5;box-shadow:4px 7px 20px rgba(0,0,0,.55)}
.pol::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:11px;height:11px;background:radial-gradient(circle at 35% 30%,#ff8080,#cc1010);border-radius:50%;box-shadow:0 2px 5px rgba(0,0,0,.35),inset 0 1px 2px rgba(255,180,180,.4);z-index:3}
.pol-img{width:100%;aspect-ratio:1;overflow:hidden;background:linear-gradient(135deg,#e8d0d8,#d8c0c8);display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.pol:nth-child(1) .pol-img{aspect-ratio:2/1;font-size:1.8rem}
.pol-img img{width:100%;height:100%;object-fit:cover}
.pol-cap{font-family:'Dancing Script',cursive;font-size:.58rem;color:#bbb;text-align:center;padding:.18rem 0}
.flora-btn{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.9rem;color:rgba(255,255,255,.35);background:none;border:1px solid rgba(255,255,255,.1);padding:.5rem 1.4rem;border-radius:50px;cursor:pointer;transition:all .3s;letter-spacing:.12em}
.flora-btn:hover{color:rgba(255,255,255,.65);border-color:rgba(255,255,255,.25)}

/* PAGE 4 VIDEO */
#pg4{background:#141210;overflow-y:auto;display:none;flex-direction:column;align-items:center}
#pg4.on{display:flex}
.p4-in{position:relative;z-index:1;width:100%;max-width:480px;padding:3rem 1.2rem 5rem;display:flex;flex-direction:column;align-items:center;gap:1.5rem}
.vid-hd{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(1.1rem,4.5vw,1.6rem);color:rgba(255,255,255,.8);text-align:center}
.vid-sb{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.85rem;color:rgba(255,255,255,.3);text-align:center;margin-top:-.8rem}
.vid-wrap{width:100%;border-radius:3px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.7)}
.vid-wrap iframe,.vid-wrap video{width:100%;aspect-ratio:16/9;border:none;display:block}
.vdiv{display:flex;align-items:center;gap:.7rem;width:100%}
.vdiv-l{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,.1),transparent)}
.vdiv-f{font-size:1rem;opacity:.3}

/* LOADING */
#loading{position:fixed;inset:0;background:#fdfcfa;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;transition:opacity 1.2s}
.ld-fl{font-size:2.2rem;animation:envFlt 2s ease-in-out infinite}
.ld-tx{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:rgba(140,90,70,.55);letter-spacing:.22em}
.ld-br{width:120px;height:1px;background:rgba(180,130,100,.15);position:relative;overflow:hidden}
.ld-br::after{content:'';position:absolute;inset:0;background:rgba(180,130,100,.4);animation:ldB 1.5s ease forwards;transform-origin:left}
@keyframes ldB{from{transform:scaleX(0)}to{transform:scaleX(1)}}

/* ERROR */
#err{position:fixed;inset:0;background:#fdfcfa;z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem;text-align:center;padding:2rem}

/* MUSIC BAR */
#mbar{position:fixed;bottom:0;left:0;right:0;z-index:8800;background:rgba(18,14,10,.94);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.06);padding:.48rem 1rem;display:none;align-items:center;gap:.6rem}
#mbar.on{display:flex;animation:mbSl .4s ease}
@keyframes mbSl{from{transform:translateY(100%)}to{transform:none}}
.mb-disc{width:24px;height:24px;border-radius:50%;flex-shrink:0;background:repeating-conic-gradient(#1a0a0a 0deg,#2d1a14 4deg,#1a0a0a 8deg);position:relative}
.mb-disc::before{content:'';position:absolute;inset:30%;border-radius:50%;background:#b06050}
.mb-disc::after{content:'';position:absolute;inset:44%;border-radius:50%;background:rgba(255,255,255,.7)}
.mb-disc.sp{animation:dSpin 2.5s linear infinite}
@keyframes dSpin{to{transform:rotate(360deg)}}
.mb-info{flex:1;min-width:0}
.mb-t{font-size:.68rem;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mb-a{font-size:.56rem;color:rgba(255,255,255,.38)}
.mb-bar{flex:1;height:2px;background:rgba(255,255,255,.1);cursor:pointer;border-radius:1px;min-width:60px}
.mb-fill{height:100%;background:rgba(180,110,90,.5);border-radius:1px;width:0%}
.mb-btns{display:flex;gap:.35rem}
.mb-btn{background:rgba(255,255,255,.06);border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;color:rgba(255,255,255,.7);font-size:.72rem;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="cur"></div>

<div id="loading">
  <div class="ld-fl">🌸</div>
  <p class="ld-tx">A Bouquet for You</p>
  <div class="ld-br"></div>
</div>

<div id="err">
  <p style="font-size:2rem">🥀</p>
  <p style="font-family:'Playfair Display',serif;font-style:italic;font-size:1.1rem;color:#8b5050">Hadiah tidak dijumpai</p>
  <p style="font-size:.75rem;color:rgba(100,60,50,.4);margin-top:.3rem">Link mungkin sudah tamat tempoh</p>
</div>

<div id="mbar">
  <div class="mb-disc" id="mb-disc"></div>
  <div class="mb-info"><p class="mb-t" id="mb-t">♪ Lagu Kita</p><p class="mb-a" id="mb-a"></p></div>
  <div class="mb-bar" id="mb-bar" onclick="ska(event)"><div class="mb-fill" id="mb-fill"></div></div>
  <div class="mb-btns"><button class="mb-btn" id="mb-play" onclick="tgp()">⏸</button><button class="mb-btn" onclick="tgm()">🔊</button></div>
</div>

<!-- PAGE 0 ENVELOPE -->
<div class="pg on" id="pg0">
  <div class="env-scene">
    <div class="env" onclick="openEnv()" id="env-el">
      <div class="env-box">
        <div class="env-flap"></div><div class="env-sl"></div>
        <div class="env-sr"></div><div class="env-sb"></div>
        <div class="env-deco">💐</div>
      </div>
    </div>
    <p class="tap-txt">Tap to open</p>
  </div>
</div>

<!-- PAGE 1 HEART BOUQUET -->
<div class="pg" id="pg1">
  <div class="pet" style="--lft:8%;--fs:.85rem;--dur:5.5s;--dl:0s">🌸</div>
  <div class="pet" style="--lft:22%;--fs:1rem;--dur:6.5s;--dl:.8s">🌺</div>
  <div class="pet" style="--lft:38%;--fs:.8rem;--dur:5s;--dl:1.5s">🌷</div>
  <div class="pet" style="--lft:55%;--fs:.9rem;--dur:7s;--dl:.3s">🌸</div>
  <div class="pet" style="--lft:70%;--fs:.85rem;--dur:5.5s;--dl:2s">🌼</div>
  <div class="pet" style="--lft:85%;--fs:.9rem;--dur:6s;--dl:1s">🌺</div>
  <div class="heart-scene" onclick="goPage('pg2')">
    <div class="flower-heart">
      <div class="fh-bg"></div>
      <div class="hfe" style="top:15%;left:20%;--fs:1.8rem;--op:.45;--dur:6s;--dl:0s;--r:-12deg;--r2:10deg">🌸</div>
      <div class="hfe" style="top:10%;left:55%;--fs:2rem;--op:.4;--dur:5s;--dl:.5s;--r:8deg;--r2:-10deg">🌺</div>
      <div class="hfe" style="top:30%;left:10%;--fs:1.5rem;--op:.35;--dur:7s;--dl:1s;--r:-8deg;--r2:12deg">🌷</div>
      <div class="hfe" style="top:30%;right:10%;--fs:1.6rem;--op:.4;--dur:6s;--dl:.3s;--r:10deg;--r2:-8deg">🌼</div>
      <div class="hfe" style="top:50%;left:15%;--fs:1.4rem;--op:.3;--dur:8s;--dl:1.5s;--r:-15deg;--r2:8deg">🌸</div>
      <div class="hfe" style="top:50%;right:15%;--fs:1.5rem;--op:.35;--dur:5.5s;--dl:.8s;--r:12deg;--r2:-10deg">🌺</div>
      <div class="hfe" style="top:65%;left:28%;--fs:1.3rem;--op:.3;--dur:7s;--dl:2s;--r:-8deg;--r2:15deg">🌷</div>
      <div class="hfe" style="top:65%;right:28%;--fs:1.4rem;--op:.35;--dur:6s;--dl:.4s;--r:10deg;--r2:-12deg">🌸</div>
      <div class="hfe" style="top:78%;left:42%;--fs:1.5rem;--op:.3;--dur:7.5s;--dl:1.2s;--r:-10deg;--r2:8deg">🌼</div>
    </div>
    <p class="p1-lbl">tap to continue ✿</p>
  </div>
</div>

<!-- PAGE 2 FULL BLOOM -->
<div class="pg" id="pg2">
  <div class="bloom-fill"></div>
  <div class="bf" style="top:3%;left:5%;--fs:3.5rem;--op:.42;--dur:7s;--dl:0s;--ra:-15deg;--rb:10deg">🌸</div>
  <div class="bf" style="top:8%;right:3%;--fs:3rem;--op:.38;--dur:6s;--dl:.5s;--ra:12deg;--rb:-8deg">🌺</div>
  <div class="bf" style="top:22%;left:0%;--fs:2.5rem;--op:.32;--dur:8s;--dl:1s;--ra:-8deg;--rb:14deg">🌷</div>
  <div class="bf" style="top:18%;right:5%;--fs:3.2rem;--op:.42;--dur:7.5s;--dl:.2s;--ra:14deg;--rb:-10deg">🌼</div>
  <div class="bf" style="top:40%;left:2%;--fs:2.8rem;--op:.3;--dur:9s;--dl:.8s;--ra:-12deg;--rb:8deg">🌻</div>
  <div class="bf" style="top:42%;right:0%;--fs:3rem;--op:.35;--dur:6.5s;--dl:1.3s;--ra:8deg;--rb:-14deg">🌸</div>
  <div class="bf" style="bottom:20%;left:3%;--fs:3.5rem;--op:.4;--dur:7s;--dl:.4s;--ra:-10deg;--rb:12deg">🌺</div>
  <div class="bf" style="bottom:15%;right:4%;--fs:3rem;--op:.38;--dur:8s;--dl:.9s;--ra:10deg;--rb:-8deg">🌷</div>
  <div class="bf" style="bottom:5%;left:20%;--fs:2.8rem;--op:.32;--dur:7s;--dl:1.5s;--ra:-14deg;--rb:10deg">🌸</div>
  <div class="bf" style="bottom:8%;right:20%;--fs:3.2rem;--op:.4;--dur:6s;--dl:.6s;--ra:8deg;--rb:-12deg">🌼</div>
  <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="goPage('pg3')">
    <p class="bloom-tap">✿ tap to read ✿</p>
  </div>
</div>

<!-- PAGE 3 LETTER + PHOTOS -->
<div class="pg" id="pg3">
  <div class="bot-bg">
    <div class="bg-fl" style="bottom:-2%;left:-8%;--fs:12rem;--op:.11;--rot:-25deg">🌿</div>

              <div class="s-row"><span class="s-lbl">From</span><span class="s-name" id="s-from">...</span></div>
            </div>
            <div class="s-right">
              <div class="postage" id="s-stamp">🌸</div>

    </div>
    <div style="width:100%">
      <p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.9rem;color:rgba(255,255,255,.35);text-align:center;margin-bottom:1rem;letter-spacing:.1em">our memories</p>

<!-- PAGE 4 VIDEO -->
<div class="pg" id="pg4">
  <div class="bot-bg">
    <div class="bg-fl" style="bottom:-2%;left:-8%;--fs:12rem;--op:.11;--rot:-25deg">🌿</div>
    <div class="bg-fl" style="top:5%;right:5%;--fs:10rem;--op:.07;--rot:10deg">🌻</div>
  </div>
  <div class="p4-in">
    <div class="vdiv"><div class="vdiv-l"></div><div class="vdiv-f">🌸</div><div class="vdiv-l"></div></div>
    <p class="vid-hd" id="vid-hd">Untuk Kamu 🎥</p>
    <p class="vid-sb" id="vid-sb">dengan penuh kasih sayang ✿</p>
    <div class="vid-wrap" id="vid-wrap"></div>
    <div class="vdiv"><div class="vdiv-l"></div><div class="vdiv-f">🌺</div><div class="vdiv-l"></div></div>
    <button class="flora-btn" onclick="goPage('pg3')">← Kembali ke Surat</button>
  </div>
</div>

<div style="position:fixed;bottom:-300px;left:-300px;width:1px;height:1px;overflow:hidden;pointer-events:none"><div id="ytp"></div></div>

<script>
const SB_URL='https://lejpuajafuenlfvlovfg.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlanB1YWphZnVlbmxmdmxvdmZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMjYyNTAsImV4cCI6MjA5MjcwMjI1MH0.rwABj8DyY3dijUr5TurtMoemZgG2b9LgSHSicUMxMmc';
const cur=document.getElementById('cur');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px'});

async function load(){
  const p=new URLSearchParams(window.location.search);
  const id=p.get('id');
  if(!id){showErr();return}
  try{
    const r=await fetch(`${SB_URL}/rest/v1/gifts?id=eq.${id}&select=*`,{headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`}});
    if(!r.ok)throw new Error();
    const d=await r.json();
    if(!d||!d.length){showErr();return}
    build(d[0]);
    const ld=document.getElementById('loading');
    ld.style.opacity='0';
    setTimeout(()=>ld.style.display='none',1200);
  }catch(e){showErr()}
}

function showErr(){document.getElementById('loading').style.display='none';document.getElementById('err').style.display='flex'}

function build(G){
  const k=G.kategori||'anniversary';
  document.getElementById('s-to').textContent=G.nama2||'Sayang';
  document.getElementById('s-from').textContent=G.nama1||'Kamu';
  const stamps={birthday:'🎂',anniversary:'🌹',raya:'🌙',kawan:'🌻'};
  document.getElementById('s-stamp').textContent=stamps[k]||'🌸';
  const body=document.getElementById('s-body');
  [G.b1,G.b2,G.b3].filter(Boolean).forEach(t=>{
    const p=document.createElement('p');p.textContent=t;p.style.marginBottom='.55rem';body.appendChild(p);
  });
  document.getElementById('s-sign').textContent=`— ${G.nama1||'Kamu'} 🌸`;

  const grid=document.getElementById('pol-grid');
  const bgs=['linear-gradient(135deg,#ead0d8,#d8b8c8)','linear-gradient(135deg,#eadfcc,#d8cdb0)','linear-gradient(135deg,#ccd8ea,#b8c8d8)','linear-gradient(135deg,#d8ccec,#c8b8e0)','linear-gradient(135deg,#ccecd8,#b8e0c8)','linear-gradient(135deg,#eaccdc,#d8b8cc)'];
  for(let i=0;i<6;i++){
    const pol=document.createElement('div');pol.className='pol';
    if(i===0)pol.style.gridColumn='span 2';
    const img=document.createElement('div');img.className='pol-img';img.style.background=bgs[i];
    if(G.photos&&G.photos[i]){const im=document.createElement('img');im.src=G.photos[i];img.appendChild(im)}
    else img.textContent=['📷','🌸','💕','✨','🌺','🌷'][i];
    const cap=document.createElement('p');cap.className='pol-cap';
    cap.textContent=(G.labels&&G.labels[i])||['us 🌸','moment','love','memory','together','forever'][i];
    pol.appendChild(img);pol.appendChild(cap);grid.appendChild(pol);
  }

  const wrap=document.getElementById('vid-wrap');
  let hasVid=false;
  if(G.video_url){
    const yt=G.video_url.match(/(?:youtu\.be\/|[?&]v=)([a-zA-Z0-9_-]{11})/);
    if(yt){
      const iframe=document.createElement('iframe');
      iframe.src=`https://www.youtube.com/embed/${yt[1]}?rel=0&modestbranding=1&playsinline=1`;
      iframe.allowFullscreen=true;wrap.appendChild(iframe);hasVid=true;
      document.getElementById('vid-hd').textContent='Video Untuk Kamu 🎥';
    }
  } else if(G.video_data){
    const vid=document.createElement('video');vid.src=G.video_data;vid.controls=true;vid.playsInline=true;wrap.appendChild(vid);hasVid=true;
  } else if(G.lagu_id){
    const iframe=document.createElement('iframe');
    iframe.src=`https://www.youtube.com/embed/${G.lagu_id}?rel=0&modestbranding=1&playsinline=1`;
    iframe.allowFullscreen=true;wrap.appendChild(iframe);hasVid=true;
    document.getElementById('vid-hd').textContent=G.lagu_nama||'Lagu Kita 🎵';
    document.getElementById('vid-sb').textContent=G.lagu_artis||'';
  }
  if(hasVid)document.getElementById('vid-btn').style.display='inline-block';

  if(G.lagu_id){
    document.getElementById('mb-t').textContent=G.lagu_nama||'Lagu Kita';
    document.getElementById('mb-a').textContent=G.lagu_artis||'';
    window._lid=G.lagu_id;
  }
}

function goPage(id){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo({top:0,behavior:'instant'});
  if(id==='pg3'){playMusic();showMbar()}
}

function openEnv(){
  const el=document.getElementById('env-el');
  el.style.transition='all .5s cubic-bezier(.22,1,.36,1)';
  el.style.transform='scale(1.15)';el.style.opacity='0';
  setTimeout(()=>goPage('pg1'),450);
}

let yp=null,yr=false,ypl=false;
function lyt(){if(document.querySelector('script[src*="youtube.com/iframe_api"]'))return;const t=document.createElement('script');t.src='https://www.youtube.com/iframe_api';document.head.appendChild(t)}
window.onYouTubeIframeAPIReady=function(){
  if(!window._lid)return;
  yp=new YT.Player('ytp',{height:'1',width:'1',videoId:window._lid,
    playerVars:{autoplay:0,controls:0,disablekb:1,fs:0,iv_load_policy:3,modestbranding:1,rel:0,playsinline:1},
    events:{
      onReady:()=>{yr=true},
      onStateChange:e=>{
        if(e.data===1){document.getElementById('mb-disc').classList.add('sp');document.getElementById('mb-play').textContent='⏸';ypl=true;upBar()}
        else if(e.data===2||e.data===0){document.getElementById('mb-disc').classList.remove('sp');document.getElementById('mb-play').textContent='▶';ypl=false}
      }
    }
  });
};
function playMusic(){if(!window._lid)return;lyt();const t=setInterval(()=>{if(yr&&yp){yp.playVideo();clearInterval(t)}},200)}
function tgp(){if(!yp)return;ypl?yp.pauseVideo():yp.playVideo()}
function tgm(){if(!yp)return;yp.isMuted()?yp.unMute():yp.mute()}
function ska(e){if(!yp||!yr)return;const r=e.currentTarget.getBoundingClientRect();yp.seekTo((e.clientX-r.left)/r.width*yp.getDuration(),true)}
function upBar(){if(!yp||!ypl)return;const d=yp.getDuration(),c=yp.getCurrentTime();if(d>0)document.getElementById('mb-fill').style.width=(c/d*100)+'%';if(ypl)setTimeout(upBar,800)}
function showMbar(){document.getElementById('mbar').classList.add('on')}
load();
</script>
</body>
</html>
