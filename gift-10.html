<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiftKita 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Pacifico&family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100svh;overflow-x:hidden}
body{font-family:"Nunito",sans-serif;cursor:none}
#cur{position:fixed;width:9px;height:9px;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
#cur-ring{position:fixed;width:26px;height:26px;border:2px solid rgba(255,255,255,.3);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform .15s}
#loading{position:fixed;inset:0;z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;background:#0a0a0a;transition:opacity .8s}
.ld-ico{font-size:2.5rem;animation:ldb 1s ease-in-out infinite}
@keyframes ldb{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.ld-txt{font-family:"Pacifico",cursive;font-size:1.2rem;color:#FF3D7F}
.ld-bar{width:160px;height:3px;background:rgba(255,61,127,.12);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;width:0;animation:ldfill 1.5s ease forwards;background:linear-gradient(to right,#FF3D7F,#FF6B9D)}
@keyframes ldfill{to{width:100%}}
#err{position:fixed;inset:0;z-index:9000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem;text-align:center;padding:2rem;background:#0a0a0a;color:#fff}
.gp{display:none;min-height:100svh;width:100%;position:relative;overflow:hidden;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.2rem}
.gp.act{display:flex;animation:pgi .55s cubic-bezier(.22,1,.36,1)}
@keyframes pgi{from{opacity:0;transform:scale(.96) translateY(14px)}to{opacity:1;transform:none}}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.sb{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.st{position:absolute;opacity:.3;animation:stf var(--d,6s) ease-in-out infinite;animation-delay:var(--dl,0s)}
@keyframes stf{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.env{width:clamp(180px,56vw,250px);cursor:pointer;filter:drop-shadow(0 8px 22px rgba(0,0,0,.2));transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.env:hover{transform:scale(1.05) translateY(-4px)}
.envb{width:100%;padding-bottom:70%;border-radius:8px;position:relative;overflow:hidden;border:3px solid rgba(255,255,255,.4)}
.efl{position:absolute}
.eft{top:0;left:0;right:0;height:55%;clip-path:polygon(0 0,100% 0,50% 100%)}
.efl2{top:0;left:0;bottom:0;width:52%;clip-path:polygon(0 0,100% 50%,0 100%)}
.efr{top:0;right:0;bottom:0;width:52%;clip-path:polygon(100% 0,0 50%,100% 100%)}
.efb{bottom:0;left:0;right:0;height:55%;clip-path:polygon(0 100%,100% 100%,50% 0%)}
.seal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:clamp(46px,13vw,60px);height:clamp(46px,13vw,60px);border-radius:50%;z-index:3;box-shadow:0 4px 14px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;font-size:clamp(1.1rem,3.8vw,1.4rem);animation:sbo 2.2s ease-in-out infinite;border:3px solid rgba(255,255,255,.6);cursor:pointer}
@keyframes sbo{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-54%) scale(1.06)}}
#gp0{gap:1.2rem;text-align:center}
.g0-tit{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:clamp(1.4rem,6vw,2.2rem);line-height:1.3;opacity:0;animation:fu .7s .35s forwards;position:relative;z-index:1}
.g0-hint{font-size:.68rem;font-weight:700;letter-spacing:.1em;opacity:0;animation:fu .6s .9s forwards;position:relative;z-index:1;opacity:.55}
#gp1{text-align:center;gap:.8rem}
.g1-eyebrow{font-size:.58rem;letter-spacing:.4em;text-transform:uppercase;font-weight:700;padding:.28rem 1rem;border-radius:18px;opacity:0;animation:fu .5s .1s forwards;position:relative;z-index:1;display:inline-block}
.g1-names{font-size:clamp(2.6rem,12vw,6rem);line-height:.88;opacity:0;animation:fu .8s .2s forwards;position:relative;z-index:1}
.g1-amp{display:block;opacity:0;animation:fu .6s .35s forwards;position:relative;z-index:1}
.g1-rib{display:flex;align-items:center;gap:.75rem;opacity:0;animation:fu .6s .5s forwards;position:relative;z-index:1}
.g1-rl{flex:0 0 34px;height:1.5px}
.g1-rt{font-size:.63rem;letter-spacing:.18em;font-weight:700;text-transform:uppercase}
.g1-cta{border:none;color:#fff;font-family:"Nunito",sans-serif;font-weight:800;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;padding:.82rem 1.9rem;border-radius:50px;cursor:pointer;transition:all .3s;opacity:0;animation:fu .6s .8s forwards;position:relative;z-index:1}
#gp2{gap:1.6rem}
.g2-cards{display:flex;flex-wrap:wrap;gap:.85rem;justify-content:center;max-width:400px;width:100%;position:relative;z-index:1}
.g2-mc{flex:0 0 calc(33% - .6rem);min-width:100px;max-width:125px;background:rgba(255,255,255,.92);border-radius:14px;padding:1.3rem .65rem .9rem;display:flex;flex-direction:column;align-items:center;gap:.55rem;cursor:pointer;box-shadow:0 5px 16px rgba(0,0,0,.12);border:2px solid rgba(255,255,255,.6);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.g2-mc:hover{transform:translateY(-5px) scale(1.04)}
.g2-mc-ico{font-size:2rem}
.g2-mc-lbl{font-weight:800;font-size:.78rem}
.g2-mc-sub{font-size:.54rem;opacity:.35;font-weight:600}
#gp3{padding:2.5rem 1.2rem}
.g3-wrap{position:relative;z-index:1;max-width:460px;width:100%;display:flex;flex-direction:column;gap:1rem;align-items:center}
.g-paper{padding:1.7rem clamp(1rem,4vw,1.9rem);position:relative;width:100%;border-radius:10px}
.g-stamp{position:absolute;top:-10px;right:13px;width:34px;height:42px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:.9rem;border:2px solid rgba(255,255,255,.5)}
.g-dt{font-size:.6rem;letter-spacing:.1em;margin-bottom:1rem;font-weight:600;opacity:.4}
.g-to{font-size:.95rem;margin-bottom:.8rem}
.g-body{font-size:.84rem;line-height:1.9}
.g-body p{margin-bottom:.75rem}
.g-sign{font-size:1.3rem;text-align:right;margin-top:.8rem}
.g-bk{background:none;font-family:"Nunito",sans-serif;font-weight:800;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;padding:.5rem 1.4rem;border-radius:50px;cursor:pointer;transition:all .3s;position:relative;z-index:1}
#gp4{gap:1.3rem;padding:2.5rem 1.2rem}
.g4-tit{font-size:clamp(1.3rem,5.5vw,1.9rem);text-align:center;position:relative;z-index:1}
.g4-bloom{font-size:clamp(3.5rem,13vw,6rem);animation:bb 3s ease-in-out infinite;position:relative;z-index:1}
@keyframes bb{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-12px) rotate(5deg)}}
.g4-stk{display:grid;grid-template-columns:repeat(2,1fr);gap:.55rem;max-width:400px;width:100%;position:relative;z-index:1}
.g4-sn{background:#fff;border-radius:9px;padding:.75rem;font-size:.76rem;line-height:1.5;font-weight:600;color:#333;box-shadow:3px 3px 0 rgba(0,0,0,.05)}
.g4-sn:nth-child(odd){transform:rotate(-.6deg)}.g4-sn:nth-child(even){transform:rotate(.5deg)}
#gp5{gap:1.2rem;padding:2.5rem 1.2rem}
.g5-board{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;max-width:360px;width:100%;position:relative;z-index:1}
.g5-scp{background:#fff;padding:.45rem .45rem .26rem;border-radius:5px;box-shadow:3px 4px 12px rgba(0,0,0,.15);cursor:pointer}
.g5-scp:nth-child(1){grid-column:span 2;transform:rotate(-2.5deg)}.g5-scp:nth-child(2){transform:rotate(2deg)}.g5-scp:nth-child(3){transform:rotate(-1.5deg)}.g5-scp:nth-child(4){transform:rotate(3deg)}.g5-scp:nth-child(5){transform:rotate(-2deg)}.g5-scp:nth-child(6){transform:rotate(1.5deg)}
.g5-scp:hover{transform:rotate(0) scale(1.1) !important;z-index:5}
.g5-scpi{width:100%;aspect-ratio:1;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;overflow:hidden}
.g5-scp:nth-child(1) .g5-scpi{aspect-ratio:2/1}
.g5-scpi img{width:100%;height:100%;object-fit:cover}
.g5-scpc{font-family:"Dancing Script",cursive;font-size:.65rem;color:#888;text-align:center;padding:.15rem 0}
.g5-vrow{display:flex;align-items:center;gap:.7rem;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.25);padding:.65rem 1.3rem;border-radius:50px;cursor:pointer;position:relative;z-index:1}
.g5-vd{width:26px;height:26px;border-radius:50%;position:relative}
.g5-vd::before{content:"";position:absolute;inset:30%;border-radius:50%}
.g5-vd::after{content:"";position:absolute;inset:43%;border-radius:50%;background:rgba(255,255,255,.7)}
#mbar{position:fixed;bottom:0;left:0;right:0;z-index:8500;display:none;align-items:center;justify-content:space-between;padding:.5rem 1.1rem;border-top:2px solid rgba(255,255,255,.2)}
#mbar.on{display:flex}
.mbd{width:26px;height:26px;border-radius:50%;position:relative;flex-shrink:0}
.mbd::before{content:"";position:absolute;inset:30%;border-radius:50%}
.mbd::after{content:"";position:absolute;inset:43%;border-radius:50%;background:rgba(255,255,255,.7)}
.mbd.sp,.g5-vd.sp{animation:vs 2.5s linear infinite}
@keyframes vs{to{transform:rotate(360deg)}}
.mbt{font-size:.7rem;color:#fff;font-weight:700}.mbs{font-size:.58rem;color:rgba(255,255,255,.55)}
.mbp{flex:1;height:3px;background:rgba(255,255,255,.18);border-radius:2px;margin:0 .5rem;cursor:pointer}
.mbpf{height:100%;background:#fff;border-radius:2px;width:0%}
.mbctl{display:flex;gap:.5rem}
.mbbtn{background:rgba(255,255,255,.15);border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;color:#fff;font-size:.8rem;display:flex;align-items:center;justify-content:center}
.hrt{position:fixed;pointer-events:none;z-index:9400;font-size:var(--fs,1.1rem);left:var(--x,50vw);bottom:-40px;animation:hrta var(--du,4s) ease-in forwards;animation-delay:var(--dl,0s)}
@keyframes hrta{0%{opacity:0;transform:translateY(0) scale(.5)}10%{opacity:1}90%{opacity:.28}100%{opacity:0;transform:translateY(-105vh)}}
.sc1{background:linear-gradient(135deg,#FFD6E8,#FFB3CE)}.sc2{background:linear-gradient(135deg,#FFE4F0,#FFCCE0)}.sc3{background:linear-gradient(135deg,#FFF0D6,#FFE0B0)}.sc4{background:linear-gradient(135deg,#E8F4FF,#C8E4FF)}.sc5{background:linear-gradient(135deg,#F0FFE8,#D8FFCC)}.sc6{background:linear-gradient(135deg,#FFE8FF,#FFCCE8)}
</style>
</head>
<body>
<div id="cur"></div><div id="cur-ring"></div>
<div id="loading"><div class="ld-ico">🎀</div><p class="ld-txt">Memuat hadiah...</p><div class="ld-bar"><div class="ld-fill"></div></div></div>
<div id="err"><div style="font-size:3rem">😢</div><p style="font-family:Pacifico,cursive;font-size:1.3rem;color:#FF3D7F">Hadiah tak jumpa</p><p style="font-size:.8rem;color:rgba(255,255,255,.4);max-width:300px;margin-top:.5rem">Link mungkin sudah tamat</p></div>
<div id="mbar"><div class="mbi" style="display:flex;align-items:center;gap:.6rem"><div class="mbd" id="mbd"></div><div><p class="mbt" id="mbt">🎵</p><p class="mbs" id="mbs">♪</p></div></div><div class="mbp" id="mbp" onclick="ska(event)"><div class="mbpf" id="mbpf"></div></div><div class="mbctl"><button class="mbbtn" id="mbpl" onclick="tgp()">⏸</button><button class="mbbtn" onclick="tgm()">🔊</button></div></div>
<div class="gp act" id="gp0">
  <div class="sb"><span class="st" style="top:8%;left:10%;--d:5s">🌸</span><span class="st" style="top:15%;right:8%;--d:6s;--dl:.5s">✨</span><span class="st" style="bottom:20%;left:8%;--d:7s;--dl:1s">⭐</span><span class="st" style="bottom:14%;right:8%;--d:5.5s;--dl:.3s">💕</span></div>
  <p id="g0-sub" style="font-size:.65rem;letter-spacing:.3em;font-weight:700;text-transform:uppercase;opacity:0;animation:fu .6s .2s forwards;position:relative;z-index:1">🎀 A Gift For You 🎀</p>
  <p class="g0-tit" id="g0-tit"></p>
  <div class="env" onclick="openEnv()" style="position:relative;z-index:1"><div class="envb" id="envb"><div class="efl eft" id="eft"></div><div class="efl efl2" id="efl2"></div><div class="efl efr" id="efr"></div><div class="efl efb" id="efb"></div><div class="seal" id="seal">🎀</div></div></div>
  <p class="g0-hint">🎀 Click the seal to open 🎀</p>
</div>
<div class="gp" id="gp1">
  <div style="display:flex;flex-direction:column;align-items:center;gap:.8rem;text-align:center;position:relative;z-index:1">
    <div id="g1-deco"></div>
    <p class="g1-eyebrow" id="g1-eyebrow"></p>
    <div class="g1-names" id="g1-names"></div>
    <div class="g1-amp" id="g1-amp"></div>
    <div class="g1-rib"><div class="g1-rl" id="g1-rl1"></div><span class="g1-rt" id="g1-rt"></span><div class="g1-rl" id="g1-rl2"></div></div>
    <button class="g1-cta" id="g1-cta" onclick="go('gp2')">Buka Hadiah 🎀</button>
  </div>
</div>
<div class="gp" id="gp2">
  <div style="display:flex;flex-direction:column;align-items:center;gap:1.5rem;width:100%;position:relative;z-index:1">
    <h2 id="g2-tit" style="font-family:Cormorant Garamond,serif;font-style:italic;font-size:clamp(1.6rem,6.5vw,2.5rem);color:#fff;text-align:center"></h2>
    <div class="g2-cards" id="g2-cards"></div>
  </div>
</div>
<div class="gp" id="gp3">
  <div class="g3-wrap">
    <p class="g3-hd" id="g3-hd" style="font-family:Cormorant Garamond,serif;font-style:italic;font-size:clamp(1.2rem,5vw,1.8rem);text-align:center;position:relative;z-index:1"></p>
    <div class="g-paper" id="g-paper"><div class="g-stamp" id="g-stamp">🌸</div><p class="g-dt" id="g-dt"></p><p class="g-to" id="g-to"></p><div class="g-body"><p id="g-b1"></p><p id="g-b2"></p><p id="g-b3"></p></div><p class="g-sign" id="g-sign"></p></div>
    <button class="g-bk" id="g-bk1" onclick="go('gp2')">← Kembali</button>
  </div>
</div>
<div class="gp" id="gp4">
  <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:1.2rem;max-width:400px;width:100%;text-align:center">
    <p class="g4-tit" id="g4-tit"></p>
    <div class="g4-bloom" id="g4-bloom">🌸</div>
    <div class="g4-stk" id="g4-stk"></div>
    <button class="g-bk" id="g-bk2" onclick="go('gp2')">← Kembali</button>
  </div>
</div>
<div class="gp" id="gp5">
  <p style="font-family:Cormorant Garamond,serif;font-style:italic;font-size:clamp(1.3rem,5.5vw,2rem);color:#fff;text-align:center;position:relative;z-index:1">Kenangan Kita 📸</p>
  <div class="g5-board" id="g5-board"></div>
  <div class="g5-vrow" onclick="go('gp2')"><div class="g5-vd" id="g5-vd"></div><div><p style="font-size:.65rem;letter-spacing:.15em;color:#fff;font-weight:700;text-transform:uppercase" id="g5-vl">Lagu kita 🎵</p></div></div>
  <div style="position:relative;z-index:1"><button class="g-bk" style="border-color:rgba(255,255,255,.25);color:#fff" onclick="go('gp2')">← Kembali</button></div>
</div>
<div style="position:fixed;bottom:-300px;left:-300px;width:1px;height:1px;overflow:hidden;pointer-events:none"><div id="ytp"></div></div>
<script>
const SB_URL="https://lejpuajafuenlfvlovfg.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlanB1YWphZnVlbmxmdmxvdmZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMjYyNTAsImV4cCI6MjA5MjcwMjI1MH0.rwABj8DyY3dijUr5TurtMoemZgG2b9LgSHSicUMxMmc";
const ROUTES={"anniversary-floral":"gift-floral.html","birthday-floral":"gift-floral.html","raya-floral":"gift-floral.html","kawan-floral":"gift-floral.html","anniversary-pixel":"gift-pixel.html","birthday-pixel":"gift-pixel.html","raya-pixel":"gift-pixel.html","kawan-pixel":"gift-pixel.html"};
const cd=document.getElementById("cur"),cr=document.getElementById("cur-ring");
let mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my;
document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY});
(function cl(){cd.style.cssText=`left:${mx}px;top:${my}px`;rx+=(mx-rx)*.11;ry+=(my-ry)*.11;cr.style.cssText=`left:${rx}px;top:${ry}px`;requestAnimationFrame(cl)})();
async function loadGift(){
  const params=new URLSearchParams(window.location.search);
  const id=params.get("id");
  const t=params.get("t")||"";
  if(!id){showErr();return}
  // Redirect pixel/floral templates
  if(ROUTES[t]){
    const base=window.location.href.replace(/gift\.html.*/,"");
    window.location.replace(base+ROUTES[t]+"?id="+id+"&t="+t);
    return;
  }
  try{
    const res=await fetch(`${SB_URL}/rest/v1/gifts?id=eq.${id}&select=*`,{headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`}});
    if(!res.ok)throw new Error();
    const data=await res.json();
    if(!data||!data.length){showErr();return}
    // Check template from DB too
    const tmpl=data[0].template||"";
    if(ROUTES[tmpl]){
      const base=window.location.href.replace(/gift\.html.*/,"");
      window.location.replace(base+ROUTES[tmpl]+"?id="+id+"&t="+tmpl);
      return;
    }
    buildGift(data[0]);
    document.getElementById("loading").style.opacity="0";
    setTimeout(()=>document.getElementById("loading").style.display="none",900);
  }catch(e){showErr()}
}
function showErr(){document.getElementById("loading").style.display="none";document.getElementById("err").style.display="flex"}
function buildGift(G){
  const pk=G.pk||"#FF3D7F",p2=G.p2||"#FF6B9D",pb=G.pb||"#FFB3D1",bk=G.bk||"#FFF0F5";
  document.body.style.background=bk;
  document.getElementById("mbar").style.background=`linear-gradient(90deg,${pk},${p2})`;
  document.getElementById("cur").style.background=pk;cr.style.borderColor=pk+"55";
  const s=document.createElement("style");
  s.textContent=`#gp0,#gp1{background:linear-gradient(160deg,${bk},${pb}22)}#gp2,#gp5{background:${pk}}#gp3,#gp4{background:${bk}}.g-paper{background:#fff;box-shadow:0 6px 24px rgba(0,0,0,.08);border-radius:12px}.g-paper::before{content:"";position:absolute;top:0;left:1.4rem;right:1.4rem;height:3px;background:linear-gradient(to right,${pk},${p2},${pk});border-radius:0 0 3px 3px}.g-body{color:#5a3040}.g-bk{color:${pk};border:1.5px solid ${pk}33}.g4-sn{color:#333}.g5-vd,.mbd{background:repeating-conic-gradient(#1a0a0f 0deg,#2d1a25 4deg,#1a0a0f 8deg)}.g5-vd::before,.mbd::before{background:${pk}!important}#gp2::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 20px,rgba(255,255,255,.04) 20px,rgba(255,255,255,.04) 21px)}`;
  document.head.appendChild(s);
  document.getElementById("envb").style.background=`linear-gradient(145deg,${pb},${pk})`;
  document.getElementById("eft").style.background=`linear-gradient(to bottom,#FF8FB5,${pb})`;
  document.getElementById("efl2").style.background=pk;document.getElementById("efr").style.background=pk;
  document.getElementById("efb").style.background=`linear-gradient(to top,${pk},${p2})`;
  document.getElementById("seal").style.background=`radial-gradient(circle at 38% 35%,#fff,${pb} 40%,${pk} 80%)`;
  const sealE={birthday:"🎂",anniversary:"🎀",raya:"🌙",kawan:"👫"};
  document.getElementById("seal").textContent=sealE[G.kategori]||"🎀";
  document.getElementById("g0-tit").style.color=pk;
  const gr={birthday:"Selamat Hari Jadi",anniversary:"Happy Anniversary",raya:"Selamat Hari Raya",kawan:"Untuk Kamu"};
  document.getElementById("g0-tit").innerHTML=`${gr[G.kategori]||"Happy"},<br>${G.nama2}! 🎀`;
  document.getElementById("g1-eyebrow").textContent={birthday:`🎂 Happy Birthday!`,anniversary:`💕 ${G.tahun||""} Tahun Bersama`,raya:"🌙 Selamat Hari Raya",kawan:"👫 Untuk Sahabat"}[G.kategori]||"🎀";
  document.getElementById("g1-eyebrow").style.cssText=`color:${pk};background:${pk}18;border:1px solid ${pk}33`;
  document.getElementById("g1-names").style.color=pk;
  document.getElementById("g1-names").innerHTML=`<span style="-webkit-text-stroke:2.5px ${pk};color:#fff">${G.nama1||""}</span>`;
  document.getElementById("g1-amp").innerHTML=`<span style="color:${pb};font-size:clamp(1.2rem,5vw,2rem)">&amp;</span><br><span style="color:${pk}">${G.nama2||""}</span>`;
  document.getElementById("g1-rt").textContent=G.tarikh||"";
  document.getElementById("g1-rl1").style.background=`linear-gradient(to right,transparent,${pb})`;
  document.getElementById("g1-rl2").style.background=`linear-gradient(to left,transparent,${pb})`;
  document.getElementById("g1-cta").style.background=`linear-gradient(135deg,${pk},${p2})`;
  document.getElementById("g2-tit").textContent={birthday:"Hadiah untuk Kamu 🎂",anniversary:"These are for you 🎀",raya:"Ucapan untuk Kamu 🌙",kawan:"Untuk Kamu Sahabat 👫"}[G.kategori]||"These are for you 🎀";
  [{id:"gp3",ico:"💌",lbl:"Ucapan",sub:"Letter"},{id:"gp4",ico:"🌸",lbl:"Nota",sub:"Notes"},{id:"gp5",ico:"📸",lbl:"Memories",sub:"Photos"}].forEach(m=>{
    const d=document.createElement("div");d.className="g2-mc";d.onclick=()=>go(m.id);
    d.innerHTML=`<span class="g2-mc-ico">${m.ico}</span><span class="g2-mc-lbl" style="color:${pk}">${m.lbl}</span><span class="g2-mc-sub">${m.sub}</span>`;
    document.getElementById("g2-cards").appendChild(d);
  });
  const today=new Date().toLocaleDateString("ms-MY",{day:"numeric",month:"long",year:"numeric"});
  document.getElementById("g3-hd").style.color=pk;document.getElementById("g3-hd").textContent=`💌 Ucapan untuk ${G.nama2||"Kamu"}`;
  document.getElementById("g-dt").textContent=today;
  document.getElementById("g-to").textContent=`Kepada ${G.nama2||"sayang"},`;document.getElementById("g-to").style.color=pk;
  document.getElementById("g-b1").textContent=G.b1||"";document.getElementById("g-b2").textContent=G.b2||"";document.getElementById("g-b3").textContent=G.b3||"";
  document.getElementById("g-sign").textContent=`Dengan penuh kasih, ${G.nama1||""} ♡`;document.getElementById("g-sign").style.color=pk;
  document.getElementById("g-stamp").style.background=`linear-gradient(135deg,${pk},${p2})`;document.getElementById("g-stamp").textContent=sealE[G.kategori]||"🌸";
  document.getElementById("g4-bloom").textContent={birthday:"🎂",anniversary:"🌸",raya:"🌙",kawan:"🌻"}[G.kategori]||"🌸";
  document.getElementById("g4-tit").style.color=pk;document.getElementById("g4-tit").textContent=`Untuk ${G.nama2||"Kamu"} 💕`;
  const bl=G.bunga&&G.bunga.length?G.bunga:["Kamu istimewa ✨","Kamu disayangi 💕","Kamu luar biasa 🌟","Kamu terbaik ⭐","Sentiasa doakan 🙏","Sayang kamu! 🎀"];
  bl.forEach(t=>{const d=document.createElement("div");d.className="g4-sn";d.textContent=t;document.getElementById("g4-stk").appendChild(d)});
  document.getElementById("gp5").style.background=pk;
  const cls=["sc1","sc2","sc3","sc4","sc5","sc6"];
  for(let i=0;i<6;i++){
    const d=document.createElement("div");d.className="g5-scp";if(i===0)d.style.gridColumn="span 2";
    const img=document.createElement("div");img.className=`g5-scpi ${cls[i]}`;
    if(G.photos&&G.photos[i]){const im=document.createElement("img");im.src=G.photos[i];img.appendChild(im)}else img.textContent="📷";
    const cap=document.createElement("p");cap.className="g5-scpc";cap.textContent=(G.labels&&G.labels[i])||`Gambar ${i+1}`;
    d.appendChild(img);d.appendChild(cap);document.getElementById("g5-board").appendChild(d);
  }
  document.getElementById("g5-vl").textContent=`${G.lagu_nama||"Lagu Kita"} 🎵`;
  document.getElementById("mbt").textContent=`${G.lagu_nama||"Lagu"} 🎵`;
  document.getElementById("mbs").textContent=G.lagu_artis||"";
  window._lid=G.lagu_id;
}
function go(id){document.querySelectorAll(".gp").forEach(p=>p.classList.remove("act"));document.getElementById(id).classList.add("act");window.scrollTo({top:0,behavior:"instant"});if(id==="gp3"){pm();smb();lh(15)}if(id==="gp1"){lh(12)}if(id==="gp2")lh(4)}
function openEnv(){const e=document.querySelector(".env");e.style.transform="scale(1.1)";e.style.opacity="0";e.style.transition="all .5s";setTimeout(()=>go("gp1"),480);lh(8)}
let yp=null,yr=false,ypl=false;
function lyt(){if(document.querySelector("script[src*=youtube]"))return;const t=document.createElement("script");t.src="https://www.youtube.com/iframe_api";document.head.appendChild(t)}
window.onYouTubeIframeAPIReady=function(){if(!window._lid)return;yp=new YT.Player("ytp",{height:"1",width:"1",videoId:window._lid,playerVars:{autoplay:0,controls:0,disablekb:1,fs:0,iv_load_policy:3,modestbranding:1,rel:0},events:{onReady:()=>{yr=true},onStateChange:e=>{if(e.data===1){document.getElementById("mbd").classList.add("sp");document.getElementById("mbpl").textContent="⏸";ypl=true;up()}else if(e.data===2||e.data===0){document.getElementById("mbd").classList.remove("sp");document.getElementById("mbpl").textContent="▶";ypl=false}}}})}
function pm(){if(!window._lid)return;lyt();const t=setInterval(()=>{if(yr&&yp){yp.playVideo();clearInterval(t)}},200)}
function tgp(){if(!yp)return;ypl?yp.pauseVideo():yp.playVideo()}
function tgm(){if(!yp)return;yp.isMuted()?yp.unMute():yp.mute()}
function ska(e){if(!yp||!yr)return;const r=e.currentTarget.getBoundingClientRect();yp.seekTo((e.clientX-r.left)/r.width*yp.getDuration(),true)}
function up(){if(!yp||!ypl)return;const d=yp.getDuration(),c=yp.getCurrentTime();if(d>0)document.getElementById("mbpf").style.width=(c/d*100)+"%";if(ypl)setTimeout(up,800)}
function smb(){document.getElementById("mbar").classList.add("on")}
function lh(n){const hs=["💕","💖","💗","💓","🩷","❤️","💝","🌸"];for(let i=0;i<n;i++){const el=document.createElement("div");el.className="hrt";el.textContent=hs[~~(Math.random()*hs.length)];el.style.setProperty("--x",(5+Math.random()*90)+"vw");el.style.setProperty("--fs",(.75+Math.random()*.85)+"rem");el.style.setProperty("--du",(3.5+Math.random()*2)+"s");el.style.setProperty("--dl",(i*.14)+"s");document.body.appendChild(el);setTimeout(()=>el.remove(),7000)}}
loadGift();
</script>
