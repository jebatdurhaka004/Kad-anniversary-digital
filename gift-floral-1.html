<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>A Bouquet for You 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400;1,500&family=Playfair+Display:ital,wght@0,400;1,400;1,500&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100svh;overflow-x:hidden}
body{background:#faf8f5;font-family:'Lato',sans-serif;cursor:none}
#cur{position:fixed;width:8px;height:8px;background:rgba(160,100,80,.6);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .1s}

/* PAGES */
.pg{display:none;position:fixed;inset:0;overflow:hidden}
.pg.on{display:block}

/* ═══════════════════════════════
   PAGE 0 — ENVELOPE
   Pure white, centered envelope
   with watercolour flower illustration
═══════════════════════════════ */
#pg0{background:#faf8f5;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2rem}
#pg0.on{display:flex}

.env-container{
  animation:envFloat 3s ease-in-out infinite;
  cursor:pointer;
  filter:drop-shadow(0 8px 24px rgba(120,80,60,.12));
  transition:filter .3s;
}
.env-container:hover{filter:drop-shadow(0 12px 32px rgba(120,80,60,.2))}
.env-container:active{transform:scale(.96);transition:transform .1s}
@keyframes envFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

.tap-open{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:clamp(.82rem,3vw,1rem);
  color:rgba(140,100,80,.4);
  letter-spacing:.2em;
  animation:tapBlink 2.5s ease-in-out infinite;
}
@keyframes tapBlink{0%,100%{opacity:.4}50%{opacity:.75}}

/* ═══════════════════════════════
   PAGE 1 — HEART BOUQUET
   White background, photorealistic
   flower heart, falling petals
═══════════════════════════════ */
#pg1{background:#ffffff;cursor:pointer}
#pg1.on{display:flex;align-items:center;justify-content:center;flex-direction:column}

.heart-wrap{
  position:relative;
  animation:heartIn 1.2s cubic-bezier(.22,1,.36,1) forwards;
  opacity:0;
}
@keyframes heartIn{
  0%{opacity:0;transform:scale(.5) rotate(-5deg)}
  60%{opacity:1;transform:scale(1.05) rotate(1deg)}
  100%{opacity:1;transform:scale(1) rotate(0)}
}

/* Falling petal animation */
.petal{
  position:fixed;
  top:-60px;
  font-size:var(--s,18px);
  animation:petalFall var(--d,6s) ease-in infinite;
  animation-delay:var(--dl,0s);
  pointer-events:none;
  opacity:0;
  z-index:10;
}
@keyframes petalFall{
  0%{opacity:0;transform:translateY(0) rotate(0deg) translateX(0)}
  5%{opacity:.8}
  95%{opacity:.3}
  100%{opacity:0;transform:translateY(110vh) rotate(720deg) translateX(var(--sx,20px))}
}

.p1-hint{
  position:fixed;bottom:8%;left:50%;transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(.8rem,3vw,1rem);
  color:rgba(120,80,70,.4);letter-spacing:.18em;
  animation:tapBlink 2.5s ease-in-out infinite;
  white-space:nowrap;z-index:5;
}

/* ═══════════════════════════════
   PAGE 2 — FULL BLOOM
   Screen filled with flowers,
   zoom animation
═══════════════════════════════ */
#pg2{background:#fff;cursor:pointer}
#pg2.on{display:flex;align-items:center;justify-content:center}

.bloom-scene{
  position:absolute;inset:0;overflow:hidden;
}
.bloom-img{
  position:absolute;inset:-5%;
  animation:bloomZoom 8s ease-in-out infinite;
}
@keyframes bloomZoom{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

.bloom-tap{
  position:absolute;bottom:7%;left:50%;transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(.82rem,3vw,1rem);
  color:rgba(255,255,255,.8);letter-spacing:.22em;
  text-shadow:0 1px 6px rgba(0,0,0,.3);
  animation:tapBlink 2.5s ease-in-out infinite;
  white-space:nowrap;z-index:5;
}

/* ═══════════════════════════════
   PAGE 3 — DARK BOTANICAL LETTER
   Dark charcoal bg, SVG vine art,
   rotated stamp letter + polaroids
═══════════════════════════════ */
#pg3{background:#1a1814;overflow-y:auto}
#pg3.on{display:block}

.botanic-scene{
  position:fixed;inset:0;
  background:#1a1814;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

.p3-scroll{
  position:relative;z-index:1;
  min-height:100svh;
  display:flex;align-items:center;justify-content:center;
  padding:3rem 1.5rem 5rem;
}

/* The stamp card — slightly rotated like in video */
.stamp-card{
  background:#f8f6f2;
  position:relative;
  width:100%;max-width:440px;
  transform:rotate(-1.5deg);
  box-shadow:
    0 4px 6px rgba(0,0,0,.15),
    0 20px 60px rgba(0,0,0,.5),
    0 0 0 1px rgba(255,255,255,.05);
}
/* Stamp teeth top */
.stamp-card::before{
  content:'';position:absolute;
  top:-10px;left:0;right:0;height:10px;
  background:radial-gradient(circle at 50% 0%,#1a1814 71%,transparent 71%);
  background-size:12px 10px;background-repeat:repeat-x;
}
/* Stamp teeth bottom */
.stamp-card::after{
  content:'';position:absolute;
  bottom:-10px;left:0;right:0;height:10px;
  background:radial-gradient(circle at 50% 100%,#1a1814 71%,transparent 71%);
  background-size:12px 10px;background-repeat:repeat-x;
}
.stamp-ls{
  position:absolute;left:-10px;top:0;bottom:0;width:10px;
  background:radial-gradient(circle at 100% 50%,#1a1814 71%,transparent 71%);
  background-size:10px 12px;background-repeat:repeat-y;
}
.stamp-rs{
  position:absolute;right:-10px;top:0;bottom:0;width:10px;
  background:radial-gradient(circle at 0% 50%,#1a1814 71%,transparent 71%);
  background-size:10px 12px;background-repeat:repeat-y;
}

.stamp-inner{
  padding:1.4rem 1.5rem 1.4rem 7rem;
  position:relative;
  min-height:320px;
}

/* Polaroid strip on left — exactly like video */
.pol-strip{
  position:absolute;
  left:-1.5rem;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:.3rem;
  z-index:5;
}
.pol{
  background:#fff;
  padding:.28rem .28rem .18rem;
  box-shadow:2px 3px 10px rgba(0,0,0,.4);
  position:relative;
  width:68px;
}
.pol:nth-child(1){transform:rotate(-3deg)}
.pol:nth-child(2){transform:rotate(2deg);margin-left:.3rem}
.pol:nth-child(3){transform:rotate(-1.5deg)}
/* Red dot pin */
.pol::before{
  content:'';position:absolute;
  top:-5px;left:50%;transform:translateX(-50%);
  width:9px;height:9px;
  background:radial-gradient(circle at 35% 30%,#ff7070,#cc0808);
  border-radius:50%;
  box-shadow:0 2px 4px rgba(0,0,0,.4),inset 0 1px 2px rgba(255,200,200,.4);
  z-index:3;
}
.pol-img{
  width:100%;aspect-ratio:3/4;
  background:linear-gradient(135deg,#e0c8d0,#d0b8c0);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;
}
.pol-img img{width:100%;height:100%;object-fit:cover}

/* Letter content */
.letter-hdr{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:.8rem;padding-bottom:.6rem;
  border-bottom:1px solid rgba(150,120,90,.15);
}
.lh-tf{display:flex;flex-direction:column;gap:.35rem}
.lh-row{display:flex;flex-direction:column;gap:.05rem}
.lh-lbl{font-size:.48rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(100,70,50,.35)}
.lh-name{font-family:'Dancing Script',cursive;font-size:1.1rem;color:#3a1808;line-height:1}
.lh-right{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem}
/* Postage stamp box */
.postage-box{
  width:38px;height:48px;
  border:1.5px solid rgba(140,110,80,.2);
  background:linear-gradient(135deg,#fdf5ec,#f5e8d8);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;
  box-shadow:1px 1px 4px rgba(0,0,0,.08);
}
/* Paperclip SVG */
.paperclip{
  color:rgba(180,150,100,.6);
  font-size:1rem;
  transform:rotate(40deg);
  display:block;
  margin-right:.1rem;
}

/* Lined paper */
.letter-lined{
  background-image:repeating-linear-gradient(
    to bottom,transparent,transparent 26px,
    rgba(150,120,90,.1) 26px,rgba(150,120,90,.1) 27px
  );
  padding:.25rem 0;
}
.letter-body{
  font-family:'Dancing Script',cursive;
  font-size:clamp(.88rem,3vw,1.04rem);
  line-height:1.96;
  color:#2a1405;
}
.letter-sign{
  font-family:'Dancing Script',cursive;
  font-size:clamp(1rem,3.5vw,1.3rem);
  color:#5a2810;
  text-align:right;
  margin-top:.5rem;
}

/* Bouquet decoration on right side of letter — like in video */
.letter-bouquet{
  position:absolute;
  right:-2.5rem;top:50%;transform:translateY(-60%) rotate(15deg);
  z-index:6;
  filter:drop-shadow(2px 4px 8px rgba(0,0,0,.4));
}

/* Nav */
.flora-nav{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  display:flex;gap:.8rem;z-index:10;
}
.fnav-btn{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:.85rem;color:rgba(255,255,255,.3);
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  padding:.45rem 1.2rem;border-radius:50px;cursor:pointer;
  transition:all .3s;letter-spacing:.1em;backdrop-filter:blur(8px);
}
.fnav-btn:hover{color:rgba(255,255,255,.65);border-color:rgba(255,255,255,.25)}
.fnav-btn.primary{
  color:rgba(255,200,150,.7);
  border-color:rgba(255,200,150,.25);
}

/* ═══════════════════════════════
   PAGE 4 — VIDEO
═══════════════════════════════ */
#pg4{background:#1a1814;overflow-y:auto}
#pg4.on{display:flex;align-items:center;justify-content:center;flex-direction:column}

.p4-inner{
  position:relative;z-index:1;
  width:100%;max-width:480px;
  padding:3rem 1.5rem 5rem;
  display:flex;flex-direction:column;align-items:center;gap:1.5rem;
}
.p4-title{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(1.1rem,4.5vw,1.6rem);
  color:rgba(255,220,180,.75);text-align:center;
}
.p4-sub{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:.85rem;color:rgba(255,255,255,.25);
  text-align:center;margin-top:-.8rem;
}
.vid-frame{
  width:100%;border-radius:4px;overflow:hidden;
  box-shadow:0 10px 40px rgba(0,0,0,.7);
}
.vid-frame iframe,.vid-frame video{width:100%;aspect-ratio:16/9;border:none;display:block}
.p4-divider{
  display:flex;align-items:center;gap:.7rem;width:100%;
}
.p4-line{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(255,200,150,.15),transparent)}
.p4-rose{font-size:.9rem;opacity:.3}

/* ═══════════════════════════════
   LOADING
═══════════════════════════════ */
#loading{
  position:fixed;inset:0;background:#faf8f5;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1.2rem;transition:opacity 1.2s;
}
.ld-env{
  animation:envFloat 2s ease-in-out infinite;
}
.ld-title{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1rem;color:rgba(140,90,70,.5);letter-spacing:.25em;
}
.ld-bar{
  width:100px;height:1px;
  background:rgba(180,130,100,.12);
  position:relative;overflow:hidden;
}
.ld-bar::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to right,rgba(180,130,100,.3),rgba(200,150,120,.5));
  animation:ldFill 1.8s ease forwards;
  transform-origin:left;
}
@keyframes ldFill{from{transform:scaleX(0)}to{transform:scaleX(1)}}

#err{
  position:fixed;inset:0;background:#faf8f5;z-index:9999;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:1rem;text-align:center;padding:2rem;
}

/* MUSIC BAR */
#mbar{
  position:fixed;bottom:0;left:0;right:0;z-index:8800;
  background:rgba(22,18,14,.93);backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,200,150,.06);
  padding:.45rem 1rem;
  display:none;align-items:center;gap:.6rem;
}
#mbar.on{display:flex;animation:mbUp .4s ease}
@keyframes mbUp{from{transform:translateY(100%)}to{transform:none}}
.mb-disc{width:22px;height:22px;border-radius:50%;flex-shrink:0;background:repeating-conic-gradient(#1a0a0a 0deg,#2d1a14 4deg,#1a0a0a 8deg);position:relative}
.mb-disc::before{content:'';position:absolute;inset:30%;border-radius:50%;background:#a06040}
.mb-disc::after{content:'';position:absolute;inset:44%;border-radius:50%;background:rgba(255,255,255,.7)}
.mb-disc.sp{animation:discSpin 2.5s linear infinite}
@keyframes discSpin{to{transform:rotate(360deg)}}
.mb-info{flex:1;min-width:0}
.mb-t{font-size:.66rem;color:rgba(255,220,180,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mb-a{font-size:.54rem;color:rgba(255,255,255,.3)}
.mb-bar{flex:1;height:2px;background:rgba(255,255,255,.08);cursor:pointer;border-radius:1px;min-width:50px}
.mb-fill{height:100%;background:rgba(180,120,80,.45);border-radius:1px;width:0%}
.mb-btns{display:flex;gap:.35rem}
.mb-btn{background:rgba(255,255,255,.05);border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;color:rgba(255,255,255,.55);font-size:.7rem;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<div id="cur"></div>

<!-- LOADING -->
<div id="loading">
  <div class="ld-env">
    <svg width="80" height="60" viewBox="0 0 80 60" fill="none">
      <rect x="2" y="2" width="76" height="56" rx="3" fill="#f0e8dc" stroke="rgba(180,150,120,.3)" stroke-width="1.5"/>
      <path d="M2 2 L40 36 L78 2" stroke="rgba(180,150,120,.2)" stroke-width="1.5" fill="none"/>
      <circle cx="40" cy="30" r="6" fill="rgba(180,100,120,.3)"/>
      <text x="40" y="34" text-anchor="middle" font-size="8">🌸</text>
    </svg>
  </div>
  <p class="ld-title">A Bouquet for You</p>
  <div class="ld-bar"></div>
</div>

<!-- ERROR -->
<div id="err">
  <svg width="50" height="50" viewBox="0 0 50 50"><text y="40" font-size="40">🥀</text></svg>
  <p style="font-family:'Playfair Display',serif;font-style:italic;font-size:1.1rem;color:#8b5050">Hadiah tidak dijumpai</p>
  <p style="font-size:.75rem;color:rgba(100,60,50,.4);margin-top:.2rem">Link mungkin sudah tamat tempoh</p>
</div>

<!-- MUSIC BAR -->
<div id="mbar">
  <div class="mb-disc" id="mb-disc"></div>
  <div class="mb-info"><p class="mb-t" id="mb-t">♪</p><p class="mb-a" id="mb-a"></p></div>
  <div class="mb-bar" id="mb-bar" onclick="ska(event)"><div class="mb-fill" id="mb-fill"></div></div>
  <div class="mb-btns">
    <button class="mb-btn" id="mb-play" onclick="tgp()">⏸</button>
    <button class="mb-btn" onclick="tgm()">🔊</button>
  </div>
</div>

<!-- ═══ PAGE 0: ENVELOPE ═══ -->
<div class="pg on" id="pg0">
  <div class="env-container" onclick="openEnv()" id="env-el">
    <!-- Watercolour illustrated envelope SVG -->
    <svg width="220" height="160" viewBox="0 0 220 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Envelope body -->
      <rect x="4" y="4" width="212" height="152" rx="4" fill="url(#envGrad)" stroke="rgba(180,150,120,.2)" stroke-width="1.5"/>
      <!-- Envelope flap top -->
      <path d="M4 4 L110 90 L216 4 Z" fill="url(#flapGrad)" stroke="rgba(180,150,120,.15)" stroke-width="1"/>
      <!-- Envelope sides -->
      <path d="M4 4 L4 156 L90 80 Z" fill="rgba(200,170,140,.25)"/>
      <path d="M216 4 L216 156 L130 80 Z" fill="rgba(190,160,130,.2)"/>
      <!-- Envelope bottom fold -->
      <path d="M4 156 L110 72 L216 156 Z" fill="url(#bottomGrad)"/>

      <!-- Wax seal -->
      <circle cx="110" cy="100" r="14" fill="url(#sealGrad)"/>
      <circle cx="110" cy="100" r="11" fill="none" stroke="rgba(255,255,255,.4)" stroke-width=".8"/>
      <text x="110" y="105" text-anchor="middle" font-size="10" fill="rgba(255,255,255,.9)">🌸</text>

      <!-- Watercolour flower illustration on envelope -->
      <g transform="translate(72,18)">
        <!-- Stem -->
        <path d="M38 70 Q36 55 34 42 Q32 30 30 18" stroke="#8a7a50" stroke-width="1.2" fill="none"/>
        <path d="M34 42 Q28 38 22 36" stroke="#8a7a50" stroke-width="1" fill="none"/>
        <path d="M38 55 Q44 50 48 46" stroke="#8a7a50" stroke-width="1" fill="none"/>

        <!-- Leaves -->
        <ellipse cx="20" cy="36" rx="8" ry="4" fill="#7a9860" transform="rotate(-20,20,36)" opacity=".7"/>
        <ellipse cx="50" cy="45" rx="7" ry="3.5" fill="#8aaa70" transform="rotate(15,50,45)" opacity=".65"/>
        <ellipse cx="34" cy="22" rx="6" ry="3" fill="#7a9860" transform="rotate(-10,34,22)" opacity=".6"/>

        <!-- Main flower - watercolour rose -->
        <circle cx="30" cy="16" r="12" fill="rgba(220,160,180,.15)"/>
        <!-- Petals -->
        <ellipse cx="30" cy="6" rx="5" ry="8" fill="rgba(200,130,150,.55)" transform="rotate(0,30,16)"/>
        <ellipse cx="30" cy="6" rx="5" ry="8" fill="rgba(210,140,160,.5)" transform="rotate(45,30,16)"/>
        <ellipse cx="30" cy="6" rx="5" ry="8" fill="rgba(195,125,145,.5)" transform="rotate(90,30,16)"/>
        <ellipse cx="30" cy="6" rx="5" ry="8" fill="rgba(205,135,155,.45)" transform="rotate(135,30,16)"/>
        <ellipse cx="30" cy="6" rx="5" ry="8" fill="rgba(200,130,150,.5)" transform="rotate(180,30,16)"/>
        <ellipse cx="30" cy="6" rx="5" ry="8" fill="rgba(210,140,160,.45)" transform="rotate(225,30,16)"/>
        <ellipse cx="30" cy="6" rx="5" ry="8" fill="rgba(195,125,145,.5)" transform="rotate(270,30,16)"/>
        <ellipse cx="30" cy="6" rx="5" ry="8" fill="rgba(205,135,155,.45)" transform="rotate(315,30,16)"/>
        <circle cx="30" cy="16" r="5" fill="rgba(180,100,120,.6)"/>
        <circle cx="30" cy="16" r="3" fill="rgba(160,80,100,.5)"/>

        <!-- Small flower top right -->
        <g transform="translate(52,8)">
          <circle cx="0" cy="0" r="7" fill="rgba(180,140,200,.15)"/>
          <ellipse cx="0" cy="-5" rx="3" ry="5" fill="rgba(160,120,190,.5)"/>
          <ellipse cx="0" cy="-5" rx="3" ry="5" fill="rgba(170,130,200,.45)" transform="rotate(60,0,0)"/>
          <ellipse cx="0" cy="-5" rx="3" ry="5" fill="rgba(160,120,190,.45)" transform="rotate(120,0,0)"/>
          <ellipse cx="0" cy="-5" rx="3" ry="5" fill="rgba(170,130,200,.4)" transform="rotate(180,0,0)"/>
          <ellipse cx="0" cy="-5" rx="3" ry="5" fill="rgba(160,120,190,.4)" transform="rotate(240,0,0)"/>
          <ellipse cx="0" cy="-5" rx="3" ry="5" fill="rgba(170,130,200,.4)" transform="rotate(300,0,0)"/>
          <circle cx="0" cy="0" r="3" fill="rgba(220,200,100,.7)"/>
        </g>

        <!-- Tiny berries -->
        <circle cx="44" cy="28" r="2.5" fill="rgba(140,100,160,.6)"/>
        <circle cx="48" cy="32" r="2" fill="rgba(140,100,160,.5)"/>
        <circle cx="42" cy="34" r="2" fill="rgba(140,100,160,.55)"/>
      </g>

      <defs>
        <linearGradient id="envGrad" x1="0" y1="0" x2="220" y2="160">
          <stop offset="0%" stop-color="#f7f0e6"/>
          <stop offset="100%" stop-color="#ede3d4"/>
        </linearGradient>
        <linearGradient id="flapGrad" x1="0" y1="0" x2="220" y2="90">
          <stop offset="0%" stop-color="#f2e8da"/>
          <stop offset="100%" stop-color="#e8ddd0"/>
        </linearGradient>
        <linearGradient id="bottomGrad" x1="0" y1="156" x2="220" y2="72">
          <stop offset="0%" stop-color="#ece0d0"/>
          <stop offset="100%" stop-color="#f5ecdf"/>
        </linearGradient>
        <radialGradient id="sealGrad" cx="40%" cy="35%">
          <stop offset="0%" stop-color="#c090a0"/>
          <stop offset="100%" stop-color="#906070"/>
        </radialGradient>
      </defs>
    </svg>
  </div>
  <p class="tap-open">Tap to open</p>
</div>

<!-- ═══ PAGE 1: HEART BOUQUET ═══ -->
<div class="pg" id="pg1">
  <!-- Falling petals -->

    <p class="p4-title" id="p4-title">Untuk Kamu 🎥</p>
    <p class="p4-sub" id="p4-sub">dengan penuh kasih sayang ✿</p>
    <div class="vid-frame" id="vid-frame"></div>
    <div class="p4-divider"><div class="p4-line"></div><div class="p4-rose">🌺</div><div class="p4-line"></div></div>
    <button class="fnav-btn" onclick="goPage('pg3')">← Kembali ke Surat</button>
  </div>
</div>

<div style="position:fixed;bottom:-300px;left:-300px;width:1px;height:1px;overflow:hidden;pointer-events:none"><div id="ytp"></div></div>

<script>
const SB='https://lejpuajafuenlfvlovfg.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlanB1YWphZnVlbmxmdmxvdmZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMjYyNTAsImV4cCI6MjA5MjcwMjI1MH0.rwABj8DyY3dijUr5TurtMoemZgG2b9LgSHSicUMxMmc';
const cur=document.getElementById('cur');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px'});

async function load(){
  const p=new URLSearchParams(window.location.search);
  const id=p.get('id');
  if(!id){showErr();return}
  try{
    const r=await fetch(`${SB}/rest/v1/gifts?id=eq.${id}&select=*`,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    if(!r.ok)throw new Error();
    const d=await r.json();
    if(!d||!d.length){showErr();return}
    build(d[0]);
    const ld=document.getElementById('loading');
    ld.style.opacity='0';
    setTimeout(()=>ld.style.display='none',1200);
  }catch(e){showErr()}
}
function showErr(){document.getElementById('loading').style.display='none';document.getElementById('err').style.display='flex'}

function build(G){
  const k=G.kategori||'anniversary';
  /* Letter */
  document.getElementById('lh-to').textContent=G.nama2||'Sayang';
  document.getElementById('lh-from').textContent=G.nama1||'Kamu';
  const stamps={birthday:'🎂',anniversary:'🌹',raya:'🌙',kawan:'🌻'};
  document.getElementById('postage-ico').textContent=stamps[k]||'🌸';
  const body=document.getElementById('letter-body');
  [G.b1,G.b2,G.b3].filter(Boolean).forEach(t=>{const p=document.createElement('p');p.textContent=t;p.style.marginBottom='.5rem';body.appendChild(p)});
  document.getElementById('letter-sign').textContent=`— ${G.nama1||'Kamu'} 🌸`;

  /* Polaroids */
  const strip=document.getElementById('pol-strip');
  const bgs=['linear-gradient(135deg,#e8d0d8,#d8c0c8)','linear-gradient(135deg,#d8e8f0,#c8d8e8)','linear-gradient(135deg,#e8e0d8,#d8d0c8)'];
  for(let i=0;i<3;i++){
    const pol=document.createElement('div');pol.className='pol';
    const img=document.createElement('div');img.className='pol-img';img.style.background=bgs[i];
    if(G.photos&&G.photos[i]){const im=document.createElement('img');im.src=G.photos[i];img.appendChild(im)}
    else img.textContent='📷';
    pol.appendChild(img);strip.appendChild(pol);
  }

  /* Video */
  const wrap=document.getElementById('vid-frame');
  let hasVid=false;
  if(G.video_url){
    const yt=G.video_url.match(/(?:youtu\.be\/|[?&]v=)([a-zA-Z0-9_-]{11})/);
    if(yt){const iframe=document.createElement('iframe');iframe.src=`https://www.youtube.com/embed/${yt[1]}?rel=0&modestbranding=1&playsinline=1`;iframe.allowFullscreen=true;wrap.appendChild(iframe);hasVid=true;document.getElementById('p4-title').textContent='Video Untuk Kamu 🎥'}
  } else if(G.video_data){
    const vid=document.createElement('video');vid.src=G.video_data;vid.controls=true;vid.playsInline=true;wrap.appendChild(vid);hasVid=true;
  } else if(G.lagu_id){
    const iframe=document.createElement('iframe');iframe.src=`https://www.youtube.com/embed/${G.lagu_id}?rel=0&modestbranding=1&playsinline=1`;iframe.allowFullscreen=true;wrap.appendChild(iframe);hasVid=true;
    document.getElementById('p4-title').textContent=G.lagu_nama||'Lagu Kita 🎵';
    document.getElementById('p4-sub').textContent=G.lagu_artis||'';
  }
  if(hasVid)document.getElementById('vid-btn').style.display='inline-block';

  /* Music */
  if(G.lagu_id){document.getElementById('mb-t').textContent=G.lagu_nama||'Lagu Kita';document.getElementById('mb-a').textContent=G.lagu_artis||'';window._lid=G.lagu_id}
}

function goPage(id){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo({top:0,behavior:'instant'});
  if(id==='pg3'){playMusic();showMbar()}
}

function openEnv(){
  const el=document.getElementById('env-el');
  el.style.transition='all .5s cubic-bezier(.22,1,.36,1)';
  el.style.transform='scale(1.12)';el.style.opacity='0';
  setTimeout(()=>goPage('pg1'),450);
}

/* YouTube */
let yp=null,yr=false,ypl=false;
function lyt(){if(document.querySelector('script[src*="youtube.com/iframe_api"]'))return;const t=document.createElement('script');t.src='https://www.youtube.com/iframe_api';document.head.appendChild(t)}
window.onYouTubeIframeAPIReady=function(){
  if(!window._lid)return;
  yp=new YT.Player('ytp',{height:'1',width:'1',videoId:window._lid,playerVars:{autoplay:0,controls:0,disablekb:1,fs:0,iv_load_policy:3,modestbranding:1,rel:0,playsinline:1},events:{onReady:()=>{yr=true},onStateChange:e=>{if(e.data===1){document.getElementById('mb-disc').classList.add('sp');document.getElementById('mb-play').textContent='⏸';ypl=true;upBar()}else if(e.data===2||e.data===0){document.getElementById('mb-disc').classList.remove('sp');document.getElementById('mb-play').textContent='▶';ypl=false}}}});
};
function playMusic(){if(!window._lid)return;lyt();const t=setInterval(()=>{if(yr&&yp){yp.playVideo();clearInterval(t)}},200)}
function tgp(){if(!yp)return;ypl?yp.pauseVideo():yp.playVideo()}
function tgm(){if(!yp)return;yp.isMuted()?yp.unMute():yp.mute()}
function ska(e){if(!yp||!yr)return;const r=e.currentTarget.getBoundingClientRect();yp.seekTo((e.clientX-r.left)/r.width*yp.getDuration(),true)}
function upBar(){if(!yp||!ypl)return;const d=yp.getDuration(),c=yp.getCurrentTime();if(d>0)document.getElementById('mb-fill').style.width=(c/d*100)+'%';if(ypl)setTimeout(upBar,800)}
function showMbar(){document.getElementById('mbar').classList.add('on')}

load();
</script>
</body>
</html>
