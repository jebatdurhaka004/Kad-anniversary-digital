<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GiftKita 🎀</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;min-height:100svh;display:flex;align-items:center;justify-content:center;font-family:sans-serif}
.ld{text-align:center;color:#fff}
.ld-ico{font-size:2.5rem;animation:p 1s ease-in-out infinite;margin-bottom:1rem}
@keyframes p{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.ld p{font-size:.8rem;color:rgba(255,255,255,.4)}
</style>
</head>
<body>
<div class="ld">
  <div class="ld-ico">🎀</div>
  <p>Memuat hadiah...</p>
</div>
<script>
const ROUTES={
  'anniversary-floral':'gift-floral.html',
  'birthday-floral':'gift-floral.html',
  'raya-floral':'gift-floral.html',
  'kawan-floral':'gift-floral.html',
  'anniversary-pixel':'gift-pixel.html',
  'birthday-pixel':'gift-pixel.html',
  'raya-pixel':'gift-pixel.html',
  'kawan-pixel':'gift-pixel.html',
  'birthday-cute':'gift-cute.html',
  'raya-cute':'gift-cute.html',
  'kawan-cute':'gift-cute.html',
};
const p=new URLSearchParams(window.location.search);
const id=p.get('id'),t=p.get('t')||'';
const base=window.location.href.replace(/gift\.html.*/,'');
if(!id){document.querySelector('.ld p').textContent='Link tidak sah'}
else if(ROUTES[t]){window.location.replace(base+ROUTES[t]+'?id='+id+'&t='+t)}
else{
  // Load full gift experience inline for standard templates
  const SB='https://lejpuajafuenlfvlovfg.supabase.co';
  const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlanB1YWphZnVlbmxmdmxvdmZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMjYyNTAsImV4cCI6MjA5MjcwMjI1MH0.rwABj8DyW3dijUr5TurtMoemZgG2b9LgSHSicUMxMmc';
  fetch(`${SB}/rest/v1/gifts?id=eq.${id}&select=template`,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}})
    .then(r=>r.json()).then(d=>{
      if(!d||!d.length){document.querySelector('.ld p').textContent='Hadiah tidak dijumpai';return}
      const tmpl=d[0].template||'';
      if(ROUTES[tmpl]){window.location.replace(base+ROUTES[tmpl]+'?id='+id+'&t='+tmpl)}
      else{window.location.replace(base+'gift-main.html?id='+id+'&t='+tmpl)}
    }).catch(()=>{document.querySelector('.ld p').textContent='Ralat memuatkan'});
}
</script>
</body>
</html>
