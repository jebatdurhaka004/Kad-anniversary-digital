<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>A Bouquet for You 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   RESET & BASE
═══════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:"Cormorant Garamond",serif;background:#fdfcfa;overflow:hidden;min-height:100svh;cursor:none}

/* Custom cursor */
#cur{position:fixed;width:7px;height:7px;border-radius:50%;background:rgba(175,98,78,.42);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .12s,background .2s}
#cur.click{transform:translate(-50%,-50%) scale(.5)}

/* ═══════════════════════════════════
   PAGES
═══════════════════════════════════ */
.page{position:fixed;inset:0;display:none;overflow:hidden}
.page.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
.page.scrollable{overflow-y:auto;align-items:flex-start;justify-content:flex-start}

/* Page transition */
.page.fade-in{animation:pgFadeIn .55s cubic-bezier(.22,1,.36,1) both}
@keyframes pgFadeIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}

/* ═══════════════════════════════════
   PAGE: LOADING
═══════════════════════════════════ */
#page-loading{background:#fdfcfa;z-index:9000}
.ld-bouquet{
  width:88px;height:88px;border-radius:50%;
  object-fit:cover;
  box-shadow:0 8px 32px rgba(175,98,78,.14);
  animation:ldBob 2.8s cubic-bezier(.37,0,.63,1) infinite;
  filter:saturate(1.1);
}
@keyframes ldBob{
  0%,100%{transform:translateY(0) scale(1)}
  45%{transform:translateY(-10px) scale(1.03)}
}
.ld-title{
  font-style:italic;font-size:1rem;
  color:rgba(135,88,68,.45);
  letter-spacing:.32em;
  animation:ldBreath 2.8s ease-in-out infinite;
}
@keyframes ldBreath{0%,100%{opacity:.45}50%{opacity:.82}}
.ld-bar{
  width:110px;height:1px;
  background:rgba(175,130,100,.1);
  position:relative;overflow:hidden;
}
.ld-bar::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(175,130,100,.2),rgba(210,158,118,.52));
  transform:scaleX(0);transform-origin:left;
  animation:ldBarFill 1.9s ease forwards;
}
@keyframes ldBarFill{to{transform:scaleX(1)}}
.ld-dots{display:flex;gap:.45rem}
.ld-dot{
  width:4px;height:4px;border-radius:50%;
  background:rgba(175,130,100,.3);
  animation:ldDot 1.4s ease-in-out infinite;
}
.ld-dot:nth-child(2){animation-delay:.2s}
.ld-dot:nth-child(3){animation-delay:.4s}
@keyframes ldDot{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.8;transform:scale(1.4)}}

/* ═══════════════════════════════════
   PAGE: ENVELOPE
   White. Centre. Bunga atas sampul.
   Tap → bunga kembang naik dari dalam
═══════════════════════════════════ */
#page-env{background:#fdfcfa;gap:2.8rem}

.env-stage{
  position:relative;
  width:clamp(200px,55vw,280px);
  height:clamp(280px,73vw,380px);
  cursor:pointer;
}

/* Idle float */
.env-stage.idle{animation:envFloat 4s cubic-bezier(.37,0,.63,1) infinite}
@keyframes envFloat{
  0%,100%{transform:translateY(0) rotate(0)}
  35%{transform:translateY(-10px) rotate(.5deg)}
  68%{transform:translateY(-5px) rotate(-.3deg)}
}

/* Envelope image */
.env-img{
  position:absolute;bottom:0;left:50%;
  transform:translateX(-50%);
  width:100%;z-index:2;
  filter:drop-shadow(0 8px 22px rgba(100,62,42,.1));
  transition:opacity .7s ease .4s, transform .7s ease .4s;
}

/* White flower border on top */
.env-top{
  position:absolute;top:-20%;left:50%;
  transform:translateX(-50%);
  width:110%;z-index:4;
  pointer-events:none;
  transition:opacity .35s ease;
}

/* Bouquet rises from envelope */
.env-bq{
  position:absolute;
  bottom:25%;left:50%;
  transform:translateX(-50%) scaleY(0) scaleX(0);
  transform-origin:50% 100%;
  width:108%;z-index:3;
  opacity:0;
  pointer-events:none;
  filter:drop-shadow(0 12px 30px rgba(0,0,0,.1));
}

/* BLOOMING state */
.env-stage.blooming{animation:none!important}
.env-stage.blooming .env-bq{
  animation:bqRise 1.15s cubic-bezier(.22,1,.36,1) forwards;
}
.env-stage.blooming .env-img{
  opacity:0!important;
  transform:translateX(-50%) translateY(12px) scale(.94)!important;
}
.env-stage.blooming .env-top{opacity:0}

@keyframes bqRise{
  0%{opacity:0;transform:translateX(-50%) scaleY(0) scaleX(0)}
  18%{opacity:1}
  65%{transform:translateX(-50%) scaleY(1.06) scaleX(1.04) translateY(-6px)}
  100%{opacity:1;transform:translateX(-50%) scaleY(1) scaleX(1) translateY(0)}
}

.tap-txt{
  font-style:italic;
  font-size:clamp(.8rem,2.8vw,.95rem);
  color:rgba(135,95,75,.36);
  letter-spacing:.22em;
  animation:tapBlink 2.8s ease-in-out infinite;
  transition:opacity .4s;
}
@keyframes tapBlink{0%,100%{opacity:.36}50%{opacity:.75}}
.env-stage.blooming ~ .tap-txt{opacity:0}

/* ═══════════════════════════════════
   PAGE: BOUQUET
   White. Circular real bouquet.
   Slow zoom animation.
   CSS petal fall.
═══════════════════════════════════ */
#page-bq{background:#fff;gap:0}

.bq-wrap{
  position:relative;
  width:min(84vw,84vh);
  height:min(84vw,84vh);
  max-width:450px;max-height:450px;
  cursor:pointer;
}

.bq-circle{
  width:100%;height:100%;
  border-radius:50%;
  overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(195,148,125,.07),
    0 12px 40px rgba(175,98,78,.12),
    0 32px 80px rgba(175,98,78,.07);
  animation:bqAppear .9s cubic-bezier(.22,1,.36,1) both;
}
@keyframes bqAppear{from{opacity:0;transform:scale(.68) rotate(-4deg)}to{opacity:1;transform:scale(1)}}

.bq-circle img{
  width:100%;height:100%;
  object-fit:cover;
  filter:saturate(1.2) brightness(1.04);
  animation:bqSlowZoom 15s ease-in-out infinite;
}
@keyframes bqSlowZoom{
  0%,100%{transform:scale(1) rotate(0)}
  40%{transform:scale(1.07) rotate(.5deg)}
  70%{transform:scale(1.1) rotate(-.3deg)}
}

/* Radial vignette */
.bq-vign{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle,transparent 55%,rgba(255,255,255,.3) 78%,rgba(255,255,255,.72) 100%);
  pointer-events:none;z-index:2;
}

/* CSS petals — pure shapes, zero emoji */
.petal{
  position:fixed;
  top:-30px;
  left:var(--l,50%);
  width:var(--w,10px);
  height:var(--h,16px);
  border-radius:var(--br,50% 50% 50% 50%/62% 62% 38% 38%);
  background:var(--c,rgba(238,173,183,.55));
  opacity:0;
  pointer-events:none;
  z-index:50;
  filter:blur(.3px);
  animation:petalDrop var(--d,6s) ease-in infinite var(--dl,0s);
}
@keyframes petalDrop{
  0%{opacity:0;transform:translateY(0) rotate(var(--r0,0deg)) scaleX(1)}
  5%{opacity:.7}
  30%{transform:translateY(28vh) rotate(calc(var(--r0,0deg) + 95deg)) scaleX(.85) translateX(var(--dx1,5px))}
  60%{transform:translateY(62vh) rotate(calc(var(--r0,0deg) + 210deg)) scaleX(1.1) translateX(var(--dx2,-8px))}
  95%{opacity:.1}
  100%{opacity:0;transform:translateY(112vh) rotate(calc(var(--r0,0deg) + 380deg)) scaleX(.7) translateX(var(--dx3,3px))}
}

.bq-hint{
  position:fixed;bottom:6.5%;left:50%;transform:translateX(-50%);
  font-style:italic;font-size:clamp(.78rem,2.8vw,.94rem);
  color:rgba(118,78,58,.33);letter-spacing:.18em;
  animation:tapBlink 2.8s ease-in-out infinite;
  white-space:nowrap;z-index:5;
}

/* ═══════════════════════════════════
   PAGE: FULL BLOOM
   Same bouquet zoomed to fill screen.
   Cinematic pan + zoom.
═══════════════════════════════════ */
#page-bloom{background:#f8f0e8;cursor:pointer}

.bloom-canvas{
  position:absolute;inset:-12%;
  animation:bloomCinematic 16s ease-in-out infinite;
}
@keyframes bloomCinematic{
  0%{transform:scale(1) translate(0,0)}
  20%{transform:scale(1.06) translate(-1.5%,-1.2%)}
  45%{transform:scale(1.1) translate(1.2%,-2.2%)}
  70%{transform:scale(1.07) translate(-0.8%,1.5%)}
  100%{transform:scale(1) translate(0,0)}
}
.bloom-canvas img{
  width:100%;height:100%;
  object-fit:cover;
  filter:saturate(1.32) brightness(1.06) contrast(1.03);
}
/* Subtle gradient overlay */
.bloom-overlay{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 60%,transparent 40%,rgba(0,0,0,.08) 100%);
  pointer-events:none;
}
.bloom-hint{
  position:absolute;bottom:7%;left:50%;transform:translateX(-50%);
  font-style:italic;font-size:clamp(.8rem,2.8vw,.96rem);
  color:rgba(255,255,255,.88);letter-spacing:.24em;
  text-shadow:0 1px 8px rgba(0,0,0,.22);
  animation:tapBlink 2.8s ease-in-out infinite;
  white-space:nowrap;z-index:5;
}

/* ═══════════════════════════════════
   PAGE: LETTER
   Dark charcoal. Real flowers as
   ghost shadows. Stamp letter.
   Polaroids with red pins.
═══════════════════════════════════ */
#page-letter{
  background:#18130e;
  display:none;
  flex-direction:column;
  align-items:center;
  overflow-y:auto;
  overflow-x:hidden;
}
#page-letter.active{display:flex}

/* ── Dark botanical bg ── */
.letter-bg{
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 48% 22%,#221810,#18130e 58%,#100d08);
  overflow:hidden;pointer-events:none;
}
.bg-flower{
  position:absolute;
  pointer-events:none;
  object-fit:contain;
  opacity:var(--op,.08);
  filter:grayscale(.85) brightness(.24) saturate(.4);
}

/* Animated vine lines — pure CSS */
.vine{
  position:absolute;
  border:none;
  border-left:1.5px solid rgba(80,105,60,.18);
  transform-origin:top center;
  border-radius:0 0 50% 50%;
}

/* ── Stamp card ── */
.stamp-wrap{
  position:relative;z-index:1;
  width:100%;max-width:440px;
  margin:4rem auto 6rem;
  padding:0 1.5rem;
}

.stamp{
  background:#f8f5f0;
  position:relative;
  width:100%;
  transform:rotate(-1.7deg);
  box-shadow:
    0 3px 8px rgba(0,0,0,.14),
    0 14px 38px rgba(0,0,0,.38),
    0 38px 85px rgba(0,0,0,.48);
  animation:stampIn .7s cubic-bezier(.22,1,.36,1) both .2s;
}
@keyframes stampIn{from{opacity:0;transform:rotate(-1.7deg) translateY(20px)}to{opacity:1;transform:rotate(-1.7deg) translateY(0)}}

/* Stamp perforations */
.stamp::before{
  content:'';position:absolute;top:-11px;left:0;right:0;height:11px;
  background:radial-gradient(circle at 50% 0%,#18130e 71%,transparent 71%);
  background-size:13px 11px;background-repeat:repeat-x;
}
.stamp::after{
  content:'';position:absolute;bottom:-11px;left:0;right:0;height:11px;
  background:radial-gradient(circle at 50% 100%,#18130e 71%,transparent 71%);
  background-size:13px 11px;background-repeat:repeat-x;
}
.stamp-el{position:absolute;top:0;bottom:0;width:11px}
.stamp-el.l{left:-11px;background:radial-gradient(circle at 100% 50%,#18130e 71%,transparent 71%);background-size:11px 13px;background-repeat:repeat-y}
.stamp-el.r{right:-11px;background:radial-gradient(circle at 0% 50%,#18130e 71%,transparent 71%);background-size:11px 13px;background-repeat:repeat-y}

.stamp-body{
  padding:1.6rem 1.6rem 1.6rem 7rem;
  position:relative;
  min-height:280px;
}

/* ── Polaroid strip ── */
.pol-strip{
  position:absolute;left:-2.1rem;top:50%;
  transform:translateY(-50%);
  display:flex;flex-direction:column;
  gap:.4rem;z-index:5;
}
.pol{
  background:#fff;
  padding:.32rem .32rem .22rem;
  box-shadow:3px 5px 16px rgba(0,0,0,.46);
  position:relative;width:66px;
}
.pol:nth-child(1){transform:rotate(-3.8deg)}
.pol:nth-child(2){transform:rotate(2.8deg);margin-left:.5rem}
.pol:nth-child(3){transform:rotate(-2.2deg)}

/* Red dot pin — CSS only */
.pol::before{
  content:'';position:absolute;
  top:-6px;left:50%;transform:translateX(-50%);
  width:10px;height:10px;
  background:
    radial-gradient(circle at 35% 30%,#ff7878 0%,#d40000 55%,#900000 100%);
  border-radius:50%;
  box-shadow:0 2px 6px rgba(0,0,0,.42),inset 0 1px 2px rgba(255,185,185,.38);
  z-index:6;
}
.pol-img{
  width:100%;aspect-ratio:3/4;
  overflow:hidden;
  background:linear-gradient(135deg,#e2c8d0,#d2b8c0);
  display:flex;align-items:center;justify-content:center;
}
.pol-img img{width:100%;height:100%;object-fit:cover}

/* ── Letter header ── */
.ltr-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:1rem;padding-bottom:.8rem;
  border-bottom:1px solid rgba(148,118,88,.15);
}
.ltr-tf{display:flex;flex-direction:column;gap:.45rem}
.ltr-row{display:flex;flex-direction:column;gap:.08rem}
.ltr-lbl{font-size:.48rem;letter-spacing:.24em;text-transform:uppercase;color:rgba(88,60,40,.32)}
.ltr-name{font-family:"Dancing Script",cursive;font-size:1.18rem;color:#271205;line-height:1.02}
.ltr-right{display:flex;flex-direction:column;align-items:flex-end;gap:.38rem}

/* Postage stamp */
.postage{
  width:42px;height:52px;
  border:1.5px solid rgba(138,108,78,.2);
  background:linear-gradient(148deg,#fef6eb,#f5e8d5);
  display:flex;align-items:center;justify-content:center;
  font-size:1.35rem;
  box-shadow:inset 0 0 0 3px rgba(148,118,88,.05);
}
.paperclip{font-size:.98rem;transform:rotate(38deg);opacity:.4;display:block;margin-right:.2rem}

/* ── Letter lines ── */
.ltr-lined{
  background-image:repeating-linear-gradient(
    to bottom,
    transparent,transparent 26px,
    rgba(148,118,88,.1) 26px,rgba(148,118,88,.1) 27px
  );
  padding:.32rem 0;
}
.ltr-text{
  font-family:"Dancing Script",cursive;
  font-size:clamp(.88rem,3.2vw,1.04rem);
  line-height:1.96;color:#271205;
}
.ltr-text p{margin-bottom:.52rem}
.ltr-sign{
  font-family:"Dancing Script",cursive;
  font-size:clamp(1rem,3.8vw,1.3rem);
  color:#572010;text-align:right;margin-top:.65rem;
}

/* Bouquet deco beside stamp */
.stamp-deco{
  position:absolute;right:-3.4rem;top:38%;
  transform:translateY(-52%) rotate(20deg);
  z-index:6;width:82px;
  filter:drop-shadow(4px 6px 16px rgba(0,0,0,.46));
  animation:decoSway 6s ease-in-out infinite;
}
@keyframes decoSway{
  0%,100%{transform:translateY(-52%) rotate(20deg)}
  50%{transform:translateY(-56%) rotate(17deg)}
}

/* ── Nav buttons ── */
.letter-nav{
  position:fixed;bottom:1.6rem;left:50%;transform:translateX(-50%);
  display:flex;gap:.9rem;z-index:20;
}
.l-btn{
  font-style:italic;font-size:.88rem;
  color:rgba(255,255,255,.28);
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  padding:.52rem 1.5rem;border-radius:50px;
  cursor:pointer;letter-spacing:.1em;
  backdrop-filter:blur(10px);
  transition:color .3s,border-color .3s,background .3s;
}
.l-btn:hover{color:rgba(255,255,255,.62);border-color:rgba(255,255,255,.24)}
.l-btn.accent{color:rgba(255,215,165,.62);border-color:rgba(255,215,165,.18)}

/* ═══════════════════════════════════
   PAGE: VIDEO
═══════════════════════════════════ */
#page-video{
  background:#18130e;
  display:none;flex-direction:column;
  align-items:center;overflow-y:auto;
}
#page-video.active{display:flex}

.vid-wrap{
  position:relative;z-index:1;
  width:100%;max-width:490px;
  padding:3.5rem 1.5rem 6rem;
  display:flex;flex-direction:column;align-items:center;gap:1.6rem;
  animation:vidIn .65s cubic-bezier(.22,1,.36,1) both;
}
@keyframes vidIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

.vid-title{
  font-style:italic;
  font-size:clamp(1.1rem,4.5vw,1.65rem);
  color:rgba(255,215,168,.65);
  text-align:center;
}
.vid-sub{
  font-style:italic;font-size:.86rem;
  color:rgba(255,255,255,.22);
  text-align:center;margin-top:-.9rem;
}
.vid-frame{
  width:100%;border-radius:6px;overflow:hidden;
  box-shadow:0 14px 50px rgba(0,0,0,.76);
}
.vid-frame iframe,.vid-frame video{width:100%;aspect-ratio:16/9;border:none;display:block}

.divider{display:flex;align-items:center;gap:.8rem;width:100%}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,200,140,.1),transparent)}
.divider-rose{font-size:.9rem;opacity:.22}

/* ═══════════════════════════════════
   MUSIC BAR
═══════════════════════════════════ */
#mbar{
  position:fixed;bottom:0;left:0;right:0;z-index:8900;
  background:rgba(18,14,9,.95);
  backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,200,140,.04);
  padding:.52rem 1.1rem;
  display:none;align-items:center;gap:.68rem;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.22,1,.36,1);
}
#mbar.show{display:flex;transform:translateY(0)}

.vinyl{
  width:25px;height:25px;border-radius:50%;flex-shrink:0;
  background:
    repeating-conic-gradient(#180a0a 0deg,#2d1814 4.5deg,#180a0a 9deg);
  position:relative;
}
.vinyl::before{content:'';position:absolute;inset:28%;border-radius:50%;background:#a86045}
.vinyl::after{content:'';position:absolute;inset:43%;border-radius:50%;background:rgba(255,255,255,.75)}
.vinyl.spinning{animation:vinylSpin 2.5s linear infinite}
@keyframes vinylSpin{to{transform:rotate(360deg)}}

.mbar-info{flex:1;min-width:0}
.mbar-song{font-size:.67rem;color:rgba(255,215,168,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic}
.mbar-artist{font-size:.54rem;color:rgba(255,255,255,.26)}
.mbar-progress{flex:1;height:2px;background:rgba(255,255,255,.08);cursor:pointer;border-radius:1px;min-width:55px}
.mbar-fill{height:100%;background:rgba(188,128,78,.42);border-radius:1px;width:0%;transition:width .8s linear}
.mbar-btns{display:flex;gap:.38rem}
.mbar-btn{
  background:rgba(255,255,255,.06);border:none;border-radius:50%;
  width:24px;height:24px;cursor:pointer;
  color:rgba(255,255,255,.52);font-size:.72rem;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.mbar-btn:hover{background:rgba(255,255,255,.12)}
</style>
</head>
<body>

<div id="cur"></div>

<script>
/* ═══════════════════════
   CONSTANTS
═══════════════════════ */
const SB = "https://lejpuajafuenlfvlovfg.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlanB1YWphZnVlbmxmdmxvdmZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMjYyNTAsImV4cCI6MjA5MjcwMjI1MH0.rwABj8DyY3dijUr5TurtMoemZgG2b9LgSHSicUMxMmc";

/* ═══════════════════════
   CURSOR
═══════════════════════ */
const cur = document.getElementById("cur");
document.addEventListener("mousemove", e => {
  cur.style.left = e.clientX + "px";
  cur.style.top = e.clientY + "px";
});
document.addEventListener("mousedown", () => cur.classList.add("click"));
document.addEventListener("mouseup", () => cur.classList.remove("click"));

/* ═══════════════════════
   PAGE NAVIGATION
═══════════════════════ */
let currentPage = "page-loading";

function goTo(pageId) {
  const prev = document.getElementById(currentPage);
  const next = document.getElementById(pageId);
  if (!next || prev === next) return;

  prev.classList.remove("active");
  next.classList.add("active", "fade-in");
  setTimeout(() => next.classList.remove("fade-in"), 600);

  currentPage = pageId;

  // Scroll to top for scrollable pages
  if (next.classList.contains("scrollable")) {
    next.scrollTop = 0;
  }

  // Page-specific actions
  if (pageId === "page-letter") {
    startMusic();
    showMusicBar();
  }
}

/* ═══════════════════════
   ENVELOPE BLOOM
═══════════════════════ */
function bloomEnvelope() {
  const stage = document.getElementById("env-stage");
  if (stage.classList.contains("blooming")) return;

  // Remove idle float, add bloom
  stage.classList.remove("idle");
  stage.classList.add("blooming");

  // After animation completes, go to bouquet page
  setTimeout(() => {
    goTo("page-bq");
    // Reset envelope for potential replay
    setTimeout(() => {
      stage.classList.remove("blooming");
      stage.classList.add("idle");
    }, 500);
  }, 1250);
}

/* ═══════════════════════
   LOAD DATA FROM SUPABASE
═══════════════════════ */
async function loadGift() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id) {
    showError();
    return;
  }

  try {
    const res = await fetch(
      `${SB}/rest/v1/gifts?id=eq.${id}&select=*`,
      { headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY } }
    );

    if (!res.ok) throw new Error("fetch failed");
    const data = await res.json();
    if (!data || !data.length) { showError(); return; }

    buildUI(data[0]);

    // Fade out loading, show envelope
    const ld = document.getElementById("page-loading");
    ld.style.transition = "opacity 1s ease";
    ld.style.opacity = "0";
    setTimeout(() => goTo("page-env"), 1000);

  } catch (e) {
    showError();
  }
}

function showError() {
  const ld = document.getElementById("page-loading");
  ld.innerHTML = `
    <p style="font-size:3rem">🥀</p>
    <p style="font-style:italic;font-size:1.1rem;color:rgba(140,88,68,.7);margin-top:.8rem">Hadiah tidak dijumpai</p>
    <p style="font-size:.75rem;color:rgba(100,60,50,.4);margin-top:.4rem">Link mungkin sudah tamat tempoh</p>
  `;
}

/* ═══════════════════════
   BUILD UI FROM DATA
═══════════════════════ */
function buildUI(G) {
  const kategori = G.kategori || "anniversary";

  // Letter
  document.getElementById("ltr-to").textContent = G.nama2 || "Sayang";
  document.getElementById("ltr-from").textContent = G.nama1 || "Kamu";

  const stampIcons = { birthday: "🎂", anniversary: "🌹", raya: "🌙", kawan: "🌻" };
  document.getElementById("ltr-stamp").textContent = stampIcons[kategori] || "🌸";

  const body = document.getElementById("ltr-body");
  [G.b1, G.b2, G.b3].filter(Boolean).forEach(text => {
    const p = document.createElement("p");
    p.textContent = text;
    body.appendChild(p);
  });
  document.getElementById("ltr-sign").textContent = `— ${G.nama1 || "Kamu"} 🌸`;

  // Polaroids (3 photos)
  const strip = document.getElementById("pol-strip");
  const polBgs = [
    "linear-gradient(135deg,#e2c8d2,#d2b8c2)",
    "linear-gradient(135deg,#d8e2f2,#c8d2e2)",
    "linear-gradient(135deg,#e2ded2,#d2cec2)"
  ];
  for (let i = 0; i < 3; i++) {
    const pol = document.createElement("div");
    pol.className = "pol";
    const img = document.createElement("div");
    img.className = "pol-img";
    img.style.background = polBgs[i];
    if (G.photos && G.photos[i]) {
      const im = document.createElement("img");
      im.src = G.photos[i];
      im.style.cssText = "width:100%;height:100%;object-fit:cover";
      img.appendChild(im);
    }
    pol.appendChild(img);
    strip.appendChild(pol);
  }

  // Video section
  const vf = document.getElementById("vid-frame");
  let hasVideo = false;

  if (G.video_url) {
    const ytMatch = G.video_url.match(/(?:youtu\.be\/|[?&]v=)([a-zA-Z0-9_-]{11})/);
    if (ytMatch) {
      const iframe = document.createElement("iframe");
      iframe.src = `https://www.youtube.com/embed/${ytMatch[1]}?rel=0&modestbranding=1&playsinline=1`;
      iframe.allowFullscreen = true;
      vf.appendChild(iframe);
      hasVideo = true;
      document.getElementById("vid-title").textContent = "Video Untuk Kamu 🎥";
    }
  } else if (G.video_data) {
    const vid = document.createElement("video");
    vid.src = G.video_data;
    vid.controls = true;
    vid.playsInline = true;
    vf.appendChild(vid);
    hasVideo = true;
  } else if (G.lagu_id) {
    // Use music video as video page too
    const iframe = document.createElement("iframe");
    iframe.src = `https://www.youtube.com/embed/${G.lagu_id}?rel=0&modestbranding=1&playsinline=1`;
    iframe.allowFullscreen = true;
    vf.appendChild(iframe);
    hasVideo = true;
    document.getElementById("vid-title").textContent = G.lagu_nama || "Lagu Kita 🎵";
    document.getElementById("vid-sub").textContent = G.lagu_artis || "";
  }

  if (hasVideo) {
    document.getElementById("vid-btn").style.display = "inline-block";
  }

  // Music bar
  if (G.lagu_id) {
    document.getElementById("mbar-song").textContent = G.lagu_nama || "Lagu Kita";
    document.getElementById("mbar-artist").textContent = G.lagu_artis || "";
    window._ytId = G.lagu_id;
  }
}

/* ═══════════════════════
   YOUTUBE MUSIC PLAYER
═══════════════════════ */
let ytPlayer = null;
let ytReady = false;
let ytPlaying = false;

function loadYouTubeAPI() {
  if (document.querySelector('script[src*="youtube.com/iframe_api"]')) return;
  const script = document.createElement("script");
  script.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(script);
}

window.onYouTubeIframeAPIReady = function () {
  if (!window._ytId) return;
  ytPlayer = new YT.Player("yt-player", {
    height: "1", width: "1",
    videoId: window._ytId,
    playerVars: { autoplay: 0, controls: 0, disablekb: 1, fs: 0, iv_load_policy: 3, modestbranding: 1, rel: 0, playsinline: 1 },
    events: {
      onReady: () => { ytReady = true; },
      onStateChange: (e) => {
        if (e.data === YT.PlayerState.PLAYING) {
          document.getElementById("vinyl").classList.add("spinning");
          document.getElementById("mbar-play").textContent = "⏸";
          ytPlaying = true;
          updateProgress();
        } else if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) {
          document.getElementById("vinyl").classList.remove("spinning");
          document.getElementById("mbar-play").textContent = "▶";
          ytPlaying = false;
        }
      }
    }
  });
};

function startMusic() {
  if (!window._ytId) return;
  loadYouTubeAPI();
  const tryPlay = setInterval(() => {
    if (ytReady && ytPlayer) {
      ytPlayer.playVideo();
      clearInterval(tryPlay);
    }
  }, 200);
}

function showMusicBar() {
  const mbar = document.getElementById("mbar");
  mbar.classList.add("show");
}

function togglePlay() {
  if (!ytPlayer) return;
  ytPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
}

function toggleMute() {
  if (!ytPlayer) return;
  const btn = document.querySelector(".mbar-btn:last-child");
  if (ytPlayer.isMuted()) {
    ytPlayer.unMute();
    btn.textContent = "🔊";
  } else {
    ytPlayer.mute();
    btn.textContent = "🔇";
  }
}

function seekMusic(e) {
  if (!ytPlayer || !ytReady) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  ytPlayer.seekTo(pct * ytPlayer.getDuration(), true);
}

function updateProgress() {
  if (!ytPlayer || !ytPlaying) return;
  const duration = ytPlayer.getDuration();
  const current = ytPlayer.getCurrentTime();
  if (duration > 0) {
    document.getElementById("mbar-fill").style.width = (current / duration * 100) + "%";
  }
  if (ytPlaying) setTimeout(updateProgress, 900);
}

   INIT

loadGift();
