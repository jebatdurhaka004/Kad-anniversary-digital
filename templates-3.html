<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiftKita — Pilih Template</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;overflow-x:hidden}
body{font-family:'Nunito',sans-serif;background:#0a0a0a;color:#fff;cursor:none}
#cur{position:fixed;width:9px;height:9px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference}
#cur-ring{position:fixed;width:28px;height:28px;border:1.5px solid rgba(255,255,255,.3);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform .15s}
.topbar{background:rgba(10,10,10,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);padding:0 1.5rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-back{font-size:.72rem;font-weight:700;color:rgba(255,255,255,.35);cursor:pointer;background:none;border:none;transition:color .2s}
.tb-back:hover{color:#fff}
.tb-logo{font-family:'Pacifico',cursive;font-size:1rem}
.page-header{padding:3rem 1.5rem 2rem;text-align:center}
.ph-kat{display:inline-flex;align-items:center;gap:.6rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);padding:.4rem 1rem;border-radius:50px;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:1rem}
.ph-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,8vw,3.5rem);font-style:italic;margin-bottom:.5rem}
.ph-sub{font-size:.8rem;color:rgba(255,255,255,.3);max-width:380px;margin:0 auto}
.tmpl-wrap{max-width:900px;margin:0 auto;padding:1rem 1.5rem 5rem}
.tmpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.2rem}
.tmpl-card{border-radius:16px;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,.07);transition:transform .4s cubic-bezier(.22,1,.36,1),box-shadow .3s;background:#111}
.tmpl-card:hover{transform:translateY(-6px) scale(1.01);box-shadow:0 20px 50px rgba(0,0,0,.4)}
.tc-preview{height:180px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.tc-inner{display:flex;flex-direction:column;align-items:center;gap:.5rem;text-align:center;padding:1rem;position:relative;z-index:1;width:100%}
.tc-icon{font-size:2.5rem;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3));transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.tmpl-card:hover .tc-icon{transform:scale(1.2) rotate(-5deg)}
.tc-name{font-family:'Pacifico',cursive;font-size:1rem}
.tc-tagline{font-size:.6rem;opacity:.6;letter-spacing:.1em}
.tc-name.pxf{font-family:'Press Start 2P',monospace;font-size:.6rem;line-height:1.5}
.pixel-badge{position:absolute;top:.6rem;right:.6rem;z-index:2;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.3);font-size:.42rem;font-family:'Press Start 2P',monospace;padding:.25rem .5rem;color:#fff}
.floral-badge{position:absolute;top:.6rem;right:.6rem;z-index:2;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);font-size:.55rem;padding:.25rem .55rem;color:#fff;border-radius:20px}
.tc-info{padding:.9rem 1.1rem;background:#161616;display:flex;align-items:center;justify-content:space-between}
.tc-label{font-size:.73rem;font-weight:700;color:rgba(255,255,255,.6)}
.tc-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.38rem .85rem;border-radius:18px;cursor:pointer;transition:all .2s}
.tmpl-card:hover .tc-btn{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3)}
.tmpl-card.is-pixel .tc-preview::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.08) 3px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:1}
</style>
</head>
<body>
<div id="cur"></div><div id="cur-ring"></div>
<div class="topbar">
  <button class="tb-back" onclick="window.location.href='index.html'">← Balik</button>
  <span class="tb-logo">GiftKita 🎀</span>
  <span style="width:60px"></span>
</div>
<div class="page-header">
  <p class="ph-kat" id="ph-kat">Kategori</p>
  <h1 class="ph-title" id="ph-title">Pilih Template</h1>
  <p class="ph-sub">Setiap template ada design yang berbeza!</p>
</div>
<div class="tmpl-wrap"><div class="tmpl-grid" id="tmpl-grid"></div></div>
<script>
// ALL TEMPLATES — tambah baru di sini
const TEMPLATES={
  // ANNIVERSARY
  'anniversary-hellokitty':{nama:'Hello Kitty',icon:'🎀',kategori:'anniversary',gift_page:'gift.html',form_label:{nama2_label:'Nama dia 💕',tarikh_label:'Tarikh Mula Couple',tarikh_placeholder:'23 April 2021',surat_title:'Surat Cinta',sticky_default:'Kamu baik hati 🤍\nKamu kuat 💪\nKamu unik ✨\nKamu disayangi 🌸\nKamu layak ⭐\nKamu terbaik 🎀'}},
  'anniversary-dark':{nama:'Dark Luxury',icon:'✦',kategori:'anniversary',gift_page:'gift.html',form_label:{nama2_label:'Nama dia 💛',tarikh_label:'Tarikh Mula',tarikh_placeholder:'23 April 2021',surat_title:'Surat Cinta Premium',sticky_default:'Kamu sebab aku tersenyum ✦\nCinta kita lebih dalam kata 💛\nSetiap saat bersamamu hadiah ⭐\nKamu lengkapkan dunia aku 🌙\nSelamanya dan lebih lagi ✨\nAku pilih kamu setiap hari 💫'}},
  'anniversary-romantic':{nama:'Romantic Rose',icon:'🌹',kategori:'anniversary',gift_page:'gift.html',form_label:{nama2_label:'Nama dia 🌹',tarikh_label:'Tarikh Mula',tarikh_placeholder:'23 April 2021',surat_title:'Surat Cinta',sticky_default:'Kamu cinta terhebat aku 🌹\nBersama kamu dunia indah ❤️\nSetiap hari aku bersyukur 💕\nCinta ini tak akan padam 🔥\nKamu rumah aku pulang 🏡\nSelamanya milik kamu 💍'}},
  'anniversary-pixel':{nama:'Pixel Love',icon:'🕹️',kategori:'anniversary',gift_page:'gift-pixel.html',form_label:{nama2_label:'Nama dia 💕',tarikh_label:'Tarikh Couple',tarikh_placeholder:'23 April 2021',surat_title:'Surat Cinta',sticky_default:'Kamu baik hati 🤍\nKamu kuat 💪\nKamu unik ✨\nKamu disayangi 🌸\nKamu layak ⭐\nKamu terbaik 🎀'}},
  'anniversary-floral':{nama:'Floral Bouquet 🌸',icon:'💐',kategori:'anniversary',gift_page:'gift-floral.html',form_label:{nama2_label:'Nama dia 🌸',tarikh_label:'Tarikh Mula',tarikh_placeholder:'23 April 2021',surat_title:'Surat Cinta',sticky_default:'Kamu baik hati 🌸\nKamu kuat 💪\nKamu unik ✨\nKamu disayangi 💕\nKamu layak ⭐\nKamu terbaik 🌺'}},
  // BIRTHDAY
  'birthday-confetti':{nama:'Confetti Party',icon:'🎉',kategori:'birthday',gift_page:'gift.html',form_label:{nama2_label:'Nama orang bertuah 🎂',tarikh_label:'Tarikh Birthday',tarikh_placeholder:'15 Mac 2000',surat_title:'Ucapan Birthday',sticky_default:'Semoga panjang umur 🎂\nMakin cantik/ensem 💕\nImpian kau tercapai ✨\nKau layak yang terbaik 🌟\nHappy Birthday! 🎉\nSayang kau banyak 🫶'}},
  'birthday-pastel':{nama:'Pastel Dream',icon:'🎀',kategori:'birthday',gift_page:'gift.html',form_label:{nama2_label:'Nama orang istimewa 🎀',tarikh_label:'Tarikh Birthday',tarikh_placeholder:'15 Mac 2000',surat_title:'Ucapan Birthday',sticky_default:'Kau cahaya dalam hidup 🌟\nSemoga hari kau gembira 🎉\nMakin cantik/ensem ✨\nDoa aku sentiasa untuk kau 🙏\nHappy Birthday! 💕\nSayang kau selalu 🎀'}},
  'birthday-golden':{nama:'Golden Birthday',icon:'👑',kategori:'birthday',gift_page:'gift.html',form_label:{nama2_label:'Nama si legend 👑',tarikh_label:'Tarikh Birthday',tarikh_placeholder:'15 Mac 2000',surat_title:'Ucapan Birthday Premium',sticky_default:'Kau insan yang luar biasa 👑\nSetiap hari bersamamu hadiah ✨\nSemoga penuh keberkatan 🌟\nKau layak semua kebaikan 💛\nHappy Birthday, legend! 🎂\nTerus bersinar ⭐'}},
  'birthday-pixel':{nama:'Pixel Party',icon:'🕹️',kategori:'birthday',gift_page:'gift-pixel.html',form_label:{nama2_label:'Nama orang bertuah 🎂',tarikh_label:'Tarikh Birthday',tarikh_placeholder:'15 Mac 2000',surat_title:'Ucapan Birthday',sticky_default:'Semoga panjang umur 🎂\nMakin cantik/ensem 💕\nImpian kau tercapai ✨\nKau layak yang terbaik 🌟\nHappy Birthday! 🎉\nSayang kau banyak 🫶'}},
  'birthday-floral':{nama:'Floral Birthday 🌸',icon:'💐',kategori:'birthday',gift_page:'gift-floral.html',form_label:{nama2_label:'Nama orang bertuah 🌸',tarikh_label:'Tarikh Birthday',tarikh_placeholder:'15 Mac 2000',surat_title:'Ucapan Birthday',sticky_default:'Semoga panjang umur 🌸\nMakin cantik/ensem 💕\nImpian kau tercapai ✨\nKau layak yang terbaik 🌟\nHappy Birthday! 🎉\nSayang kau banyak 🌺'}},
  // RAYA
  'raya-emas':{nama:'Raya Emas',icon:'🌙',kategori:'raya',gift_page:'gift.html',form_label:{nama2_label:'Nama penerima 🌙',tarikh_label:'Tarikh Raya',tarikh_placeholder:'1 Syawal 1446H',surat_title:'Ucapan Hari Raya',sticky_default:'Selamat Hari Raya 🌙\nMaaf Zahir Batin 🙏\nSemoga lebih berkat ✨\nTaqaballahu Minna 🌟\nDimurahkan rezeki 💛\nUkhuwah kekal abadi 🤝'}},
  'raya-hijau':{nama:'Raya Hijau',icon:'🌿',kategori:'raya',gift_page:'gift.html',form_label:{nama2_label:'Nama penerima 🌿',tarikh_label:'Tarikh Raya',tarikh_placeholder:'1 Syawal 1446H',surat_title:'Ucapan Hari Raya',sticky_default:'Selamat Hari Raya! 🌿\nMaaf Zahir Batin 🙏\nRezeki melimpah ruah 💚\nPuasa kita diterima ✨\nDikelilingi orang tersayang 🌟\nEid Mubarak! 🎊'}},
  'raya-pixel':{nama:'Pixel Raya',icon:'🕹️',kategori:'raya',gift_page:'gift-pixel.html',form_label:{nama2_label:'Nama penerima 🌙',tarikh_label:'Tarikh Raya',tarikh_placeholder:'1 Syawal 1446H',surat_title:'Ucapan Hari Raya',sticky_default:'Selamat Hari Raya 🌙\nMaaf Zahir Batin 🙏\nSemoga lebih berkat ✨\nTaqaballahu Minna 🌟\nDimurahkan rezeki 💛\nUkhuwah kekal abadi 🤝'}},
  'raya-floral':{nama:'Floral Raya 🌸',icon:'💐',kategori:'raya',gift_page:'gift-floral.html',form_label:{nama2_label:'Nama penerima 🌸',tarikh_label:'Tarikh Raya',tarikh_placeholder:'1 Syawal 1446H',surat_title:'Ucapan Hari Raya',sticky_default:'Selamat Hari Raya 🌸\nMaaf Zahir Batin 🙏\nSemoga lebih berkat ✨\nTaqaballahu Minna 🌟\nDimurahkan rezeki 💛\nUkhuwah kekal abadi 🤝'}},
  // KAWAN
  'kawan-bestfriend':{nama:'Best Friend',icon:'👯',kategori:'kawan',gift_page:'gift.html',form_label:{nama2_label:'Nama kawan kau 👯',tarikh_label:'Tahun Kenal (Optional)',tarikh_placeholder:'Contoh: 2018',surat_title:'Pesan untuk Kawan',sticky_default:'Kawan terbaik aku ada 👯\nSelalu ada masa susah 🤝\nBuat hidup lebih seronok 😂\nSayang kau sebagai kawan 💜\nPersahabatan kekal lama ✨\nKau tak ternilai 🌟'}},
  'kawan-pixel':{nama:'Pixel Friends',icon:'🕹️',kategori:'kawan',gift_page:'gift-pixel.html',form_label:{nama2_label:'Nama kawan kau 👯',tarikh_label:'Tahun Kenal (Optional)',tarikh_placeholder:'Contoh: 2018',surat_title:'Pesan untuk Kawan',sticky_default:'Kawan terbaik aku ada 👯\nSelalu ada masa susah 🤝\nBuat hidup lebih seronok 😂\nSayang kau sebagai kawan 💜\nPersahabatan kekal lama ✨\nKau tak ternilai 🌟'}},
  'kawan-floral':{nama:'Floral Friends 🌸',icon:'💐',kategori:'kawan',gift_page:'gift-floral.html',form_label:{nama2_label:'Nama kawan kau 🌸',tarikh_label:'Tahun Kenal (Optional)',tarikh_placeholder:'Contoh: 2018',surat_title:'Pesan untuk Kawan',sticky_default:'Kawan terbaik aku ada 🌸\nSelalu ada masa susah 🤝\nBuat hidup lebih seronok 😂\nSayang kau sebagai kawan 💕\nPersahabatan kekal lama ✨\nKau tak ternilai 🌺'}},
};

const PREVIEW_BG={
  'anniversary-hellokitty':'linear-gradient(135deg,#FFB3D1,#FF6B9D,#FF3D7F)',
  'anniversary-dark':'linear-gradient(135deg,#0a0a0a,#1a1208,#c9a96e)',
  'anniversary-romantic':'linear-gradient(135deg,#2d0a0a,#6b1a1a,#c0392b)',
  'anniversary-pixel':'linear-gradient(135deg,#1a0008,#e8003d,#ff6b8a)',
  'anniversary-floral':'linear-gradient(135deg,#f7f0e8,#e8c8c0,#d4a0b0)',
  'birthday-confetti':'linear-gradient(135deg,#FF6B6B,#FFE66D,#4ECDC4)',
  'birthday-pastel':'linear-gradient(135deg,#FFECD2,#FCB69F,#FF9A9E)',
  'birthday-golden':'linear-gradient(135deg,#0a0a0a,#1a1208,#c9a96e)',
  'birthday-pixel':'linear-gradient(135deg,#1a0d00,#ff6b00,#ffb347)',
  'birthday-floral':'linear-gradient(135deg,#fdf0e8,#f0d0c0,#e8b8a8)',
  'raya-emas':'linear-gradient(135deg,#0d1f0d,#1a3a1a,#c9a96e)',
  'raya-hijau':'linear-gradient(135deg,#064e3b,#065f46,#34d399)',
  'raya-pixel':'linear-gradient(135deg,#0a1a0a,#1a5c38,#c9a96e)',
  'raya-floral':'linear-gradient(135deg,#f0f8f0,#d0e8d0,#a8d8a8)',
  'kawan-bestfriend':'linear-gradient(135deg,#7C3AED,#A78BFA,#DDD6FE)',
  'kawan-pixel':'linear-gradient(135deg,#0a0a2e,#3730a3,#818cf8)',
  'kawan-floral':'linear-gradient(135deg,#fdf0f8,#f0d0e8,#e0b0d0)',
};
const PREVIEW_TXT={'anniversary-dark':'#c9a96e','birthday-golden':'#c9a96e','raya-emas':'#c9a96e','birthday-floral':'#8b4560','anniversary-floral':'#8b4560','raya-floral':'#2d5a2d','kawan-floral':'#6b2060'};
const KATEGORI_INFO={birthday:{nama:'Birthday',icon:'🎂',warna:'#FF6B6B'},anniversary:{nama:'Anniversary',icon:'💕',warna:'#FF3D7F'},raya:{nama:'Hari Raya',icon:'🌙',warna:'#2d8a4e'},kawan:{nama:'Untuk Kawan',icon:'👫',warna:'#7C3AED'}};

const cd=document.getElementById('cur'),cr=document.getElementById('cur-ring');
let mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function cl(){cd.style.cssText=`left:${mx}px;top:${my}px`;rx+=(mx-rx)*.11;ry+=(my-ry)*.11;cr.style.cssText=`left:${rx}px;top:${ry}px`;requestAnimationFrame(cl)})();

const params=new URLSearchParams(window.location.search);
const katId=params.get('kat')||'birthday';
const ki=KATEGORI_INFO[katId]||KATEGORI_INFO.birthday;

document.getElementById('ph-kat').innerHTML=`${ki.icon} &nbsp; ${ki.nama}`;
document.getElementById('ph-kat').style.color=ki.warna;
document.getElementById('ph-title').innerHTML=`Pilih Template <span style="background:linear-gradient(135deg,${ki.warna},#c44dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${ki.nama}</span>`;
document.title=`GiftKita — Template ${ki.nama}`;

const grid=document.getElementById('tmpl-grid');
const tmpls=Object.entries(TEMPLATES).filter(([id,t])=>t.kategori===katId);

tmpls.forEach(([id,t])=>{
  const isPixel=id.includes('pixel');
  const isFloral=id.includes('floral');
  const bg=PREVIEW_BG[id]||'linear-gradient(135deg,#333,#555)';
  const txtColor=PREVIEW_TXT[id]||'#fff';

  const div=document.createElement('div');
  div.className='tmpl-card'+(isPixel?' is-pixel':'');
  div.innerHTML=`
    <div class="tc-preview" style="background:${bg}">
      ${isPixel?'<span class="pixel-badge">🎮 PIXEL</span>':''}
      ${isFloral?'<span class="floral-badge">🌸 FLORAL</span>':''}
      <div class="tc-inner">
        <div class="tc-icon">${t.icon}</div>
        <p class="tc-name ${isPixel?'pxf':''}" style="color:${txtColor}">${t.nama}</p>
      </div>
    </div>
    <div class="tc-info">
      <span class="tc-label">${t.icon} ${t.nama}</span>
      <button class="tc-btn">Pilih →</button>
    </div>`;
  div.addEventListener('click',()=>{
    localStorage.setItem('gk_template',id);
    localStorage.setItem('gk_kategori',katId);
    window.location.href=`form.html?template=${id}&kat=${katId}`;
  });
  div.addEventListener('mouseenter',()=>{cr.style.transform='translate(-50%,-50%) scale(1.8)'});
  div.addEventListener('mouseleave',()=>{cr.style.transform='translate(-50%,-50%) scale(1)'});
  grid.appendChild(div);
});
</script>
</body>
</html>
